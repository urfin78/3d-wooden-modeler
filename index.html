    // Project a world-space point to screen pixels (relative to canvas).
    var _projVec = new THREE.Vector3();
    function worldToScreen(point) {
        _projVec.copy(point).project(camera);
        var rect = renderer.domElement.getBoundingClientRect();
        return {
            x: (_projVec.x * 0.5 + 0.5) * rect.width,
            y: (-_projVec.y * 0.5 + 0.5) * rect.height,
            behind: _projVec.z > 1 || _projVec.z < -1
        };
    }

    // Build BBox corners + 12 edges (corner-pair indices) for a mesh.
    function bboxCornersAndEdges(mesh) {
        var box = new THREE.Box3().setFromObject(mesh);
        if (box.isEmpty()) return null;
        var min = box.min, max = box.max;
        var c = [
            new THREE.Vector3(min.x, min.y, min.z),
            new THREE.Vector3(max.x, min.y, min.z),
            new THREE.Vector3(min.x, max.y, min.z),
            new THREE.Vector3(max.x, max.y, min.z),
            new THREE.Vector3(min.x, min.y, max.z),
            new THREE.Vector3(max.x, min.y, max.z),
            new THREE.Vector3(min.x, max.y, max.z),
            new THREE.Vector3(max.x, max.y, max.z)
        ];
        var edges = [
            [0,1],[2,3],[4,5],[6,7],
            [0,2],[1,3],[4,6],[5,7],
            [0,4],[1,5],[2,6],[3,7]
        ];
        return { corners: c, edges: edges };
    }

    // Distance from point (px,py) to segment (ax,ay)-(bx,by) in 2D, plus param t in [0,1].
    function pointToSegment2D(px, py, ax, ay, bx, by) {
        var dx = bx - ax, dy = by - ay;
        var len2 = dx * dx + dy * dy;
        var t = len2 > 0 ? ((px - ax) * dx + (py - ay) * dy) / len2 : 0;
        if (t < 0) t = 0; else if (t > 1) t = 1;
        var qx = ax + t * dx, qy = ay + t * dy;
        var ex = px - qx, ey = py - qy;
        return { dist: Math.sqrt(ex * ex + ey * ey), t: t };
    }

    // Closest points between two infinite 3D lines:
    //   line A: pA + s * dA   (camera ray)
    //   line B: pB + r * dB   (edge line)
    // Returns { s, r, pointA, pointB } where pointA is on line A, pointB on line B.
    function closestPointsTwoLines(pA, dA, pB, dB) {
        var w0 = new THREE.Vector3().subVectors(pA, pB);
        var a = dA.dot(dA);
        var b = dA.dot(dB);
        var c = dB.dot(dB);
        var d = dA.dot(w0);
        var e = dB.dot(w0);
        var denom = a * c - b * b;
        var s, r;
        if (Math.abs(denom) < 1e-9) {
            s = 0;
            r = (b > c ? d / b : e / c);
        } else {
            s = (b * e - c * d) / denom;
            r = (a * e - b * d) / denom;
        }
        var pointA = pA.clone().addScaledVector(dA, s);
        var pointB = pB.clone().addScaledVector(dB, r);
        return { s: s, r: r, pointA: pointA, pointB: pointB };
    }

    // Find best snap target across ALL visible pieces. Camera-ray based:
    //   • Corner snap: pixel distance from cursor to projected corner.
    //   • Edge snap: pixel distance to projected edge segment; the resulting 3D point is the
    //     closest point on the edge line to the camera ray (clamped to the segment), so the
    //     point sits visually under the cursor regardless of perspective.
    function findSnapTarget(mouseClientX, mouseClientY) {
        var rect = renderer.domElement.getBoundingClientRect();
        var mx = mouseClientX - rect.left;
        var my = mouseClientY - rect.top;

        var rayOrigin = raycaster.ray.origin;
        var rayDir = raycaster.ray.direction;

        var bestCornerPt = null, bestCornerD = Infinity;
        var bestEdgePt = null, bestEdgeD = Infinity;

        var meshes = pieces.filter(function(m) { return m.visible; });
        for (var mi = 0; mi < meshes.length; mi++) {
            var ce = bboxCornersAndEdges(meshes[mi]);
            if (!ce) continue;
            var sc = ce.corners.map(function(p) { return worldToScreen(p); });

            // Corners
            for (var i = 0; i < sc.length; i++) {
                if (sc[i].behind) continue;
                var dx = sc[i].x - mx, dy = sc[i].y - my;
                var d = Math.sqrt(dx * dx + dy * dy);
                if (d < bestCornerD) {
                    bestCornerD = d;
                    bestCornerPt = ce.corners[i].clone();
                }
            }

            // Edges
            for (var j = 0; j < ce.edges.length; j++) {
                var ai = ce.edges[j][0], bi = ce.edges[j][1];
                var a = sc[ai], b = sc[bi];
                if (a.behind || b.behind) continue;
                var seg = pointToSegment2D(mx, my, a.x, a.y, b.x, b.y);
                if (seg.dist < bestEdgeD) {
                    var wa = ce.corners[ai], wb = ce.corners[bi];
                    var edgeDir = new THREE.Vector3().subVectors(wb, wa);
                    var edgeLen = edgeDir.length();
                    if (edgeLen < 1e-6) continue;
                    edgeDir.multiplyScalar(1 / edgeLen);
                    var cp = closestPointsTwoLines(rayOrigin, rayDir, wa, edgeDir);
                    var rClamped = Math.max(0, Math.min(edgeLen, cp.r));
                    var ptOnEdge = wa.clone().addScaledVector(edgeDir, rClamped);
                    bestEdgeD = seg.dist;
                    bestEdgePt = ptOnEdge;
                }
            }
        }

        if (bestCornerPt && bestCornerD <= SNAP_PIXEL_TOL_CORNER) {
            return { point: bestCornerPt, kind: 'corner' };
        }
        if (bestEdgePt && bestEdgeD <= SNAP_PIXEL_TOL_EDGE) {
            return { point: bestEdgePt, kind: 'edge' };
        }
        return null;
    }

    // Angle-snap: given start point and free end point, return direction snapped to nearest
    // axis (X/Y/Z) or 45° diagonal in XY/XZ/YZ planes. Distance preserved.
    var ANGLE_SNAP_DIRS = (function() {
        var dirs = [];
        var axes = [
            { v: [1,0,0], label: 'X' },
            { v: [0,1,0], label: 'Y' },
            { v: [0,0,1], label: 'Z' }
        ];
        axes.forEach(function(a) {
            dirs.push({ v: new THREE.Vector3(a.v[0], a.v[1], a.v[2]), label: a.label, kind: 'axis' });
        });
        // 45° diagonals in three planes
        var diags = [
            { a: [1,1,0],  label: 'XY 45°' },
            { a: [1,-1,0], label: 'XY -45°' },
            { a: [1,0,1],  label: 'XZ 45°' },
            { a: [1,0,-1], label: 'XZ -45°' },
            { a: [0,1,1],  label: 'YZ 45°' },
            { a: [0,1,-1], label: 'YZ -45°' }
        ];
        diags.forEach(function(d) {
            var v = new THREE.Vector3(d.a[0], d.a[1], d.a[2]).normalize();
            dirs.push({ v: v, label: d.label, kind: 'diag' });
        });
        return dirs;
    })();

    function snapAngle(start, end) {
        var delta = new THREE.Vector3().subVectors(end, start);
        var len = delta.length();
        if (len < 1e-6) return { point: end.clone(), label: '0°' };
        var dir = delta.clone().multiplyScalar(1 / len);
        var bestDot = -Infinity, bestDir = null, bestSign = 1, bestLabel = '';
        for (var i = 0; i < ANGLE_SNAP_DIRS.length; i++) {
            var d = ANGLE_SNAP_DIRS[i];
            var dot = dir.dot(d.v);
            var ad = Math.abs(dot);
            if (ad > bestDot) {
                bestDot = ad;
                bestDir = d.v;
                bestSign = dot >= 0 ? 1 : -1;
                bestLabel = d.label;
            }
        }
        var snappedDir = bestDir.clone().multiplyScalar(bestSign);
        var snappedEnd = start.clone().addScaledVector(snappedDir, len);
        return { point: snappedEnd, label: bestLabel };
    }

    // Resolve current mouse → { point, snapped:'corner'|'edge'|null } or null if nothing usable.
    // Snap is computed against ALL visible pieces (so a nearby edge of any piece wins even when
    // the cursor is over a different piece or in empty space). Falls back to the surface hit
    // point of the piece directly under the cursor.
    function resolveRulerPoint(e) {
        getMouseNDC(e);
        raycaster.setFromCamera(mouse, camera);
        var snap = findSnapTarget(e.clientX, e.clientY);
        if (snap) return { point: snap.point.clone(), snapped: snap.kind };
        var meshes = pieces.filter(function(m) { return m.visible; });
        var hits = raycaster.intersectObjects(meshes, false);
        if (hits.length === 0) return null;
        return { point: hits[0].point.clone(), snapped: null };
    }

    // Scale snap-indicator sphere to a roughly constant screen size.
    function updateSnapIndicatorScale(point) {
        var dist = camera.position.distanceTo(point);
        var s = Math.max(2, dist * 0.012);
        rulerSnapIndicator.scale.set(s, s, s);
    }

    var ANGLE_PREVIEW_COLOR = 0xff40d0;
    var DEFAULT_PREVIEW_COLOR = 0x3a7adc;

    // Compute the point used for the second click: applies angle-snap if shift is held.
    function applyAngleSnapIfNeeded(e, geometryPoint) {
        if (!rulerFirstPoint) return { point: geometryPoint, angleLabel: null };
        if (!e.shiftKey) return { point: geometryPoint, angleLabel: null };
        var s = snapAngle(rulerFirstPoint, geometryPoint);
        return { point: s.point, angleLabel: s.label };
    }

    function setPreviewLine(p1, p2, color) {
        var arr = rulerPreviewLine.geometry.attributes.position.array;
        arr[0] = p1.x; arr[1] = p1.y; arr[2] = p1.z;
        arr[3] = p2.x; arr[4] = p2.y; arr[5] = p2.z;
        rulerPreviewLine.geometry.attributes.position.needsUpdate = true;
        rulerPreviewLine.geometry.computeBoundingSphere();
        rulerPreviewLine.computeLineDistances();
        rulerPreviewLine.material.color.setHex(color);
        rulerPreviewLine.visible = true;
    }

    function updateRulerHover(e) {
        if (!rulerMode) return;
        ensureRulerSnapIndicator();
        ensureRulerPreviewLine();
        var resolved = resolveRulerPoint(e);
        if (!resolved) {
            hideRulerPreview();
            updateRulerHint();
            return;
        }
        // Geometry snap indicator (corner/edge) is shown at the raw geometry point.
        if (resolved.snapped) {
            rulerSnapIndicator.visible = true;
            rulerSnapIndicator.position.copy(resolved.point);
            rulerSnapIndicator.material.color.setHex(
                resolved.snapped === 'corner' ? SNAP_CORNER_COLOR : SNAP_EDGE_COLOR
            );
            updateSnapIndicatorScale(resolved.point);
        } else {
            rulerSnapIndicator.visible = false;
        }
        if (rulerFirstPoint) {
            var snapped = applyAngleSnapIfNeeded(e, resolved.point);
            var color = snapped.angleLabel ? ANGLE_PREVIEW_COLOR : DEFAULT_PREVIEW_COLOR;
            setPreviewLine(rulerFirstPoint, snapped.point, color);
            updateRulerHint(snapped.angleLabel);
        } else {
            rulerPreviewLine.visible = false;
            updateRulerHint(null);
        }
    }

    function handleRulerClick(e) {
        var resolved = resolveRulerPoint(e);
        if (!resolved) return;
        var pt = resolved.point;
        if (!rulerFirstPoint) {
            rulerFirstPoint = pt;
            updateRulerHint();
        } else {
            var snapped = applyAngleSnapIfNeeded(e, pt);
            pushUndo();
            addRuler(rulerFirstPoint, snapped.point);
            rulerFirstPoint = null;
            updateRulerHint();
            hideRulerPreview();
        }
    }

    // ============================================================
    // Overlap Detection
    // ============================================================

    var overlapList = document.getElementById('overlap-list');

    function clearOverlaps() {
        overlapHighlighted.forEach(function(m) {
            if (m === selectedPiece) m.material.color.setHex(SELECT_COLOR);
            else m.material.color.setHex(WOOD_COLOR);
        });
        overlapHighlighted = [];
        overlapList.style.display = 'none';
        overlapList.textContent = '';
    }

    function showOverlaps() {
        clearOverlaps();
        var pairs = [];
        for (var i = 0; i < pieces.length; i++) {
            for (var j = i + 1; j < pieces.length; j++) {
                var boxA = new THREE.Box3().setFromObject(pieces[i]);
                var boxB = new THREE.Box3().setFromObject(pieces[j]);
                if (boxA.intersectsBox(boxB)) {
                    pairs.push([pieces[i], pieces[j]]);
                    if (overlapHighlighted.indexOf(pieces[i]) === -1) {
                        pieces[i].material.color.setHex(OVERLAP_COLOR);
                        overlapHighlighted.push(pieces[i]);
                    }
                    if (overlapHighlighted.indexOf(pieces[j]) === -1) {
                        pieces[j].material.color.setHex(OVERLAP_COLOR);
                        overlapHighlighted.push(pieces[j]);
                    }
                }
            }
        }
        if (pairs.length > 0) {
            overlapList.style.display = 'block';
            overlapList.innerHTML = '<strong>' + t('overlap.title') + '</strong><br>' +
                pairs.map(function(p) {
                    return p[0].userData.label + ' &harr; ' + p[1].userData.label;
                }).join('<br>');
        } else {
            overlapList.style.display = 'block';
            overlapList.style.color = '#88ff88';
            overlapList.textContent = t('overlap.none');
            setTimeout(function() {
                overlapList.style.display = 'none';
                overlapList.style.color = '#ff6666';
            }, 2000);
        }
    }

    // ============================================================
    // Delete & Clear
    // ============================================================

    function duplicateSelected() {
        if (!selectedPiece) return;
        var ud = selectedPiece.userData;
        var mesh;
        if (ud.csgModified) {
            // Clone raw geometry for CSG-modified pieces
            var geo = selectedPiece.geometry.clone();
            mesh = new THREE.Mesh(geo, createWoodMaterial());
            mesh.castShadow = true;
            mesh.receiveShadow = true;
        } else {
            if (ud.type === 'Board') mesh = makeBoard(ud.w, ud.h, ud.d);
            else if (ud.type === 'Dowel') mesh = makeDowel(ud.r, ud.h);
            else if (ud.type === 'Wedge') mesh = makeWedge(ud.w, ud.h, ud.d);
            else if (ud.type === 'L-Bracket') mesh = makeLBracket(ud.w, ud.h, ud.d);
            else if (ud.type === 'Tapered Leg') mesh = makeTaperedLeg(ud.rTop, ud.rBottom, ud.h);
        }
        // Copy transform with a small offset so it's visible.
        // Use world transforms so duplicates of grouped pieces land at correct scene position.
        var srcWorldPos = new THREE.Vector3();
        var srcWorldQuat = new THREE.Quaternion();
        selectedPiece.getWorldPosition(srcWorldPos);
        selectedPiece.getWorldQuaternion(srcWorldQuat);
        mesh.position.copy(srcWorldPos);
        mesh.position.x += 30;
        mesh.position.z += 30;
        mesh.quaternion.copy(srcWorldQuat);
        // Copy userData
        mesh.userData.type = ud.type;
        mesh.userData.id = ++pieceCounter;
        mesh.userData.label = (ud.label || typeName(ud.type)) + ' ' + t('duplicate.suffix');
        mesh.userData.notches = ud.csgModified ? ud.notches : 0;
        mesh.userData.csgModified = ud.csgModified || false;
        mesh.userData.price = ud.price || 0;
        mesh.userData.priceMode = ud.priceMode || 'fixed';
        if (ud.type === 'Board' || ud.type === 'Wedge' || ud.type === 'L-Bracket') {
            mesh.userData.w = ud.w; mesh.userData.h = ud.h; mesh.userData.d = ud.d;
        } else if (ud.type === 'Dowel') {
            mesh.userData.r = ud.r; mesh.userData.h = ud.h;
        } else if (ud.type === 'Tapered Leg') {
            mesh.userData.rTop = ud.rTop; mesh.userData.rBottom = ud.rBottom; mesh.userData.h = ud.h;
        }
        addPiece(mesh);
    }

    // ============================================================
    // Split Piece (kerf-aware)
    // ============================================================

    var SPLIT_KERF_KEY = 'woodmodeler.splitKerf';
    var SPLIT_MODE_KEY = 'woodmodeler.splitMode';
    var SPLIT_KEEP_LEFTOVER_KEY = 'woodmodeler.splitKeepLeftover';

    function canSplit(mesh) {
        if (!mesh) return false;
        if (mesh.userData.csgModified) return false;
        var t = mesh.userData.type;
        return t === 'Board' || t === 'Dowel';
    }

    function splitAxisOptionsForSelected() {
        if (!selectedPiece) return [];
        var ud = selectedPiece.userData;
        if (ud.type === 'Board') {
            return [
                { key: 'w', label: t('split.axis.w', { len: ud.w }), len: ud.w },
                { key: 'h', label: t('split.axis.h', { len: ud.h }), len: ud.h },
                { key: 'd', label: t('split.axis.d', { len: ud.d }), len: ud.d }
            ];
        }
        if (ud.type === 'Dowel') {
            return [{ key: 'h', label: t('split.axis.hLength', { len: ud.h }), len: ud.h }];
        }
        return [];
    }

    function openSplitModal() {
        if (!canSplit(selectedPiece)) {
            alert(t('split.cannotSplit'));
            return;
        }
        var axisSel = document.getElementById('split-axis');
        var axisRow = document.getElementById('split-axis-row');
        var opts = splitAxisOptionsForSelected();
        axisSel.innerHTML = '';
        opts.forEach(function(o) {
            var opt = document.createElement('option');
            opt.value = o.key;
            opt.textContent = o.label;
            axisSel.appendChild(opt);
        });
        // Default axis: longest dimension
        var longest = opts[0];
        opts.forEach(function(o) { if (o.len > longest.len) longest = o; });
        axisSel.value = longest.key;
        axisRow.style.display = opts.length > 1 ? '' : 'none';
        // Restore saved kerf
        var savedKerf = parseFloat(localStorage.getItem(SPLIT_KERF_KEY));
        document.getElementById('split-kerf').value = isFinite(savedKerf) && savedKerf >= 0 ? savedKerf : 3;
        // Restore saved mode
        var savedMode = localStorage.getItem(SPLIT_MODE_KEY);
        var modeSel = document.getElementById('split-mode');
        modeSel.value = (savedMode === 'length') ? 'length' : 'count';
        document.getElementById('split-count').value = 2;
        // Default part length: half of the selected axis length, rounded to 10mm
        document.getElementById('split-length').value = Math.max(1, Math.round(longest.len / 2 / 10) * 10);
        document.getElementById('split-keep-leftover').checked =
            localStorage.getItem(SPLIT_KEEP_LEFTOVER_KEY) === '1';
        updateSplitModeUI();
        updateSplitPreview();
        document.getElementById('split-modal').classList.add('open');
    }

    function updateSplitModeUI() {
        var mode = document.getElementById('split-mode').value;
        document.getElementById('split-count-row').style.display = mode === 'count' ? '' : 'none';
        document.getElementById('split-length-row').style.display = mode === 'length' ? '' : 'none';
    }

    function closeSplitModal() {
        document.getElementById('split-modal').classList.remove('open');
    }

    function getSplitParams() {
        var mode = document.getElementById('split-mode').value;
        var kerf = parseFloat(document.getElementById('split-kerf').value);
        var axis = document.getElementById('split-axis').value;
        var opts = splitAxisOptionsForSelected();
        var sel = null;
        for (var i = 0; i < opts.length; i++) if (opts[i].key === axis) sel = opts[i];
        var total = sel ? sel.len : 0;

        var keepLeftover = document.getElementById('split-keep-leftover').checked;
        var n, partLen, remainder, leftoverPiece;
        if (mode === 'length') {
            partLen = parseFloat(document.getElementById('split-length').value);
            if (isFinite(partLen) && partLen > 0 && isFinite(kerf) && kerf >= 0 && total > 0) {
                // Max n such that n*partLen + (n-1)*kerf <= total
                n = Math.floor((total + kerf) / (partLen + kerf));
                if (n < 1) n = 0;
                // Raw leftover if we stop after n-1 cuts (last piece touches the end)
                remainder = total - n * partLen - Math.max(0, n - 1) * kerf;
                // If we want to keep the leftover as a separate piece, one more kerf is consumed
                leftoverPiece = remainder - kerf;
            } else {
                n = NaN; remainder = NaN; leftoverPiece = NaN;
            }
        } else {
            n = parseInt(document.getElementById('split-count').value, 10);
            if (isFinite(n) && n >= 2 && isFinite(kerf) && kerf >= 0) {
                partLen = (total - (n - 1) * kerf) / n;
                remainder = 0;
                leftoverPiece = 0;
            } else {
                partLen = NaN; remainder = 0; leftoverPiece = 0;
            }
        }
        return {
            mode: mode, n: n, kerf: kerf, axis: axis,
            total: total, partLen: partLen, remainder: remainder,
            keepLeftover: keepLeftover, leftoverPiece: leftoverPiece
        };
    }

    function updateSplitPreview() {
        var preview = document.getElementById('split-preview');
        var confirmBtn = document.getElementById('split-confirm');
        var p = getSplitParams();
        if (!isFinite(p.kerf) || p.kerf < 0) {
            preview.textContent = t('split.error.kerf');
            preview.classList.add('err');
            confirmBtn.disabled = true;
            return;
        }
        if (p.mode === 'length') {
            if (!isFinite(p.partLen) || p.partLen <= 0) {
                preview.textContent = t('split.error.partLength');
                preview.classList.add('err');
                confirmBtn.disabled = true;
                return;
            }
            if (p.n < 2) {
                preview.textContent = t('split.error.lengthTooLarge');
                preview.classList.add('err');
                confirmBtn.disabled = true;
                return;
            }
        } else {
            if (!isFinite(p.n) || p.n < 2) {
                preview.textContent = t('split.error.count');
                preview.classList.add('err');
                confirmBtn.disabled = true;
                return;
            }
            if (!isFinite(p.partLen) || p.partLen <= 0) {
                preview.textContent = t('split.error.kerfTooLarge');
                preview.classList.add('err');
                confirmBtn.disabled = true;
                return;
            }
        }
        preview.classList.remove('err');
        confirmBtn.disabled = false;
        var keepLeftover = p.mode === 'length' && p.keepLeftover && p.leftoverPiece > 0.01;
        var cuts = keepLeftover ? p.n : p.n - 1;
        var kerfLoss = cuts * p.kerf;
        var html = t('split.preview.parts', { n: p.n, len: p.partLen.toFixed(2) });
        if (keepLeftover) {
            html += t('split.preview.leftoverExtra', { len: p.leftoverPiece.toFixed(2) });
        }
        html += '<br>' + t('split.preview.kerfLoss', {
            loss: kerfLoss.toFixed(2),
            n: cuts,
            cut: cuts === 1 ? t('split.preview.cut') : t('split.preview.cuts')
        });
        if (p.mode === 'length' && !p.keepLeftover && p.remainder > 0.01) {
            html += '<br>' + t('split.preview.leftoverDiscarded', { len: p.remainder.toFixed(2) });
        } else if (p.mode === 'length' && p.keepLeftover && p.leftoverPiece <= 0.01 && p.remainder > 0.01) {
            html += '<br>' + t('split.preview.leftoverTooSmall', { len: p.remainder.toFixed(2) });
        }
        preview.innerHTML = html;
    }

    function splitSelected() {
        if (!canSplit(selectedPiece)) return;
        var p = getSplitParams();
        if (!isFinite(p.kerf) || p.kerf < 0) return;
        if (!isFinite(p.n) || p.n < 2) return;
        if (!isFinite(p.partLen) || p.partLen <= 0) return;

        localStorage.setItem(SPLIT_KERF_KEY, String(p.kerf));
        localStorage.setItem(SPLIT_MODE_KEY, p.mode);
        localStorage.setItem(SPLIT_KEEP_LEFTOVER_KEY, p.keepLeftover ? '1' : '0');

        var makeLeftover = p.mode === 'length' && p.keepLeftover && p.leftoverPiece > 0.01;
        var totalParts = p.n + (makeLeftover ? 1 : 0);

        pushUndo();

        var src = selectedPiece;
        var ud = src.userData;
        // Use world transforms so splits work correctly when src is inside a Group
        var srcParent = src.parent || scene;
        var srcPos = new THREE.Vector3();
        var srcQuat = new THREE.Quaternion();
        src.getWorldPosition(srcPos);
        src.getWorldQuaternion(srcQuat);
        var baseLabel = ud.label || ud.type;
        var price = ud.price || 0;
        var priceMode = ud.priceMode || 'fixed';
        // For fixed prices: cost stays on the group (sourcePrice), individual pieces get 0.
        // For per-mm prices: each piece keeps its own rate (material cost is length-proportional).
        var newPrice = priceMode === 'per_mm' ? price : 0;
        var sourceId = priceMode === 'fixed' && price > 0 ? 'sg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7) : null;
        var sourcePrice = priceMode === 'fixed' ? price : 0;
        var sourcePriceMode = priceMode;
        var sourceLabel = baseLabel;

        // Local direction of the cut axis
        var localDir;
        if (p.axis === 'w') localDir = new THREE.Vector3(1, 0, 0);
        else if (p.axis === 'h') localDir = new THREE.Vector3(0, 1, 0);
        else localDir = new THREE.Vector3(0, 0, 1);
        var worldDir = localDir.clone().applyQuaternion(srcQuat);

        // Remove original from its actual parent (scene or enclosing group)
        var srcIdx = pieces.indexOf(src);
        if (srcIdx !== -1) pieces.splice(srcIdx, 1);
        removeLabel(src);
        srcParent.remove(src);
        src.geometry.dispose();
        src.material.dispose();
        selectedPiece = null;

        // Pieces start from the original's left edge; any leftover (by-length mode) hangs off the right.
        var startOffset = -p.total / 2 + p.partLen / 2;
        var created = [];

        function addSplitMesh(partLen, offsetCenter, label) {
            var mesh;
            if (ud.type === 'Board') {
                var w = p.axis === 'w' ? partLen : ud.w;
                var h = p.axis === 'h' ? partLen : ud.h;
                var d = p.axis === 'd' ? partLen : ud.d;
                mesh = makeBoard(w, h, d);
            } else {
                mesh = makeDowel(ud.r, partLen);
            }
            // Set world transform first, then attach to srcParent preserving it
            scene.add(mesh);
            mesh.quaternion.copy(srcQuat);
            mesh.position.copy(srcPos).add(worldDir.clone().multiplyScalar(offsetCenter));
            mesh.userData.label = label;
            mesh.userData.price = newPrice;
            mesh.userData.priceMode = priceMode;
            if (sourceId) {
                mesh.userData.sourceId = sourceId;
                mesh.userData.sourcePrice = sourcePrice;
                mesh.userData.sourcePriceMode = sourcePriceMode;
                mesh.userData.sourceLabel = sourceLabel;
            }
            if (srcParent !== scene && srcParent instanceof THREE.Group) {
                srcParent.attach(mesh);
                mesh.userData.groupId = srcParent.userData.gId;
            }
            pieces.push(mesh);
            if (labelsVisible && !mesh.userData.groupId) createLabel(mesh);
            applyXray(mesh);
            created.push(mesh);
        }

        for (var i = 0; i < p.n; i++) {
            var offset = startOffset + i * (p.partLen + p.kerf);
            addSplitMesh(p.partLen, offset, baseLabel + ' ' + (i + 1) + '/' + totalParts);
        }

        if (makeLeftover) {
            // Leftover center = right edge of last piece + kerf + leftoverPiece/2, relative to src center
            var leftoverOffset = -p.total / 2 + p.n * p.partLen + p.n * p.kerf + p.leftoverPiece / 2;
            addSplitMesh(p.leftoverPiece, leftoverOffset,
                baseLabel + ' ' + totalParts + '/' + totalParts + ' ' + t('split.leftoverSuffix'));
        }

        if (created.length > 0) selectPiece(created[0]);
        updateGrid();
        updateObjectList();
        updateCostSummary();
    }

    function deleteSelected() {
        if (selectedGroup) {
            pushUndo();
            var grp = selectedGroup;
            grp.children.slice().forEach(function(m) {
                var idx = pieces.indexOf(m);
                if (idx !== -1) pieces.splice(idx, 1);
                removeLabel(m);
                m.geometry.dispose();
                m.material.dispose();
            });
            deselectGroup();
            scene.remove(grp);
            var gi = groups.indexOf(grp);
            if (gi !== -1) groups.splice(gi, 1);
            selectPiece(null);
            updateGrid();
            return;
        }
        if (!selectedPiece) return;
        pushUndo();
        var idx = pieces.indexOf(selectedPiece);
        if (idx !== -1) pieces.splice(idx, 1);
        removeLabel(selectedPiece);
        if (selectedPiece.parent) selectedPiece.parent.remove(selectedPiece);
        selectedPiece.geometry.dispose();
        selectedPiece.material.dispose();
        selectedPiece = null;
        selectPiece(null);
        updateGrid();
    }

    function clearAll() {
        if (pieces.length === 0 && groups.length === 0 && rulers.length === 0) return;
        if (!confirm(t('clearAll.confirm'))) return;
        pushUndo();
        clearRulers();
        pieces.forEach(function(m) {
            removeLabel(m);
            if (m.parent) m.parent.remove(m);
            m.geometry.dispose();
            m.material.dispose();
        });
        groups.forEach(function(g) { scene.remove(g); });
        groups = [];
        selectedGroup = null;
        multiSelected.clear();
        pieces = [];
        selectedPiece = null;
        document.getElementById('group-panel').style.display = 'none';
        selectPiece(null);
        updateGrid();
    }

    // ============================================================
    // CSV Export
    // ============================================================

    function exportCSV() {
        var currency = currencySelect.value;
        var rows = [[
            t('csv.part'), t('csv.type'), t('csv.label'),
            t('panel.dim.w'), t('panel.dim.h'), t('panel.dim.d'),
            t('csv.dia'), t('csv.notches'), t('csv.sourceGroup'), t('csv.unitPrice'), t('csv.cost')
        ]];
        var totalCost = 0;
        var countedGroups = new Set();
        pieces.forEach(function(m, i) {
            var ud = m.userData;
            var cost, groupLabel;
            if (ud.sourceId) {
                groupLabel = '"' + (ud.sourceLabel || typeName(ud.type)) + '"';
                if (!countedGroups.has(ud.sourceId)) {
                    countedGroups.add(ud.sourceId);
                    cost = ud.sourcePriceMode === 'per_mm'
                        ? pieces.filter(function(p) { return p.userData.sourceId === ud.sourceId; })
                              .reduce(function(s, p) { return s + computePieceCost(p); }, 0)
                        : (ud.sourcePrice || 0);
                    totalCost += cost;
                } else {
                    cost = 0;
                }
            } else {
                groupLabel = '';
                cost = computePieceCost(m);
                totalCost += cost;
            }
            var row = [i + 1, typeName(ud.type), '"' + (ud.label || '') + '"'];
            if (ud.type === 'Board' || ud.type === 'Wedge' || ud.type === 'L-Bracket') {
                row.push(ud.w, ud.h, ud.d, '', ud.notches);
            } else if (ud.type === 'Dowel') {
                row.push('', ud.h, '', ud.r * 2, ud.notches);
            } else if (ud.type === 'Tapered Leg') {
                row.push('', ud.h, '', ud.rTop * 2 + '/' + ud.rBottom * 2, ud.notches);
            }
            row.push(groupLabel, currency + (ud.price || 0).toFixed(2), currency + cost.toFixed(2));
            rows.push(row);
        });
        rows.push(['', '', '', '', '', '', '', '', '', t('csv.total'), currency + totalCost.toFixed(2)]);
        var csv = rows.map(function(r) { return r.join(','); }).join('\n');
        var blob = new Blob([csv], { type: 'text/csv' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'cut_list.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    // ============================================================
    // Click / Raycasting
    // ============================================================

    var isDragging = false;
    var mouseDownPos = new THREE.Vector2();

    // Drag-to-move state
    var dragMode = false;
    var wasSnappedXZ = false;
    var wasSnappedY = false;
    var dragPiece = null;
    var dragPlane = new THREE.Plane();
    var dragOffset = new THREE.Vector3();
    var dragStarted = false;
    var dragIntersect = new THREE.Vector3();

    function getMouseNDC(e) {
        var rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    }

    renderer.domElement.addEventListener('mousedown', function(e) {
        if (e.button !== 0) return;
        mouseDownPos.set(e.clientX, e.clientY);
        isDragging = false;
        dragStarted = false;

        // Don't start object drag in cut or ruler mode
        if (cutMode) return;
        if (rulerMode) return;

        // Ctrl+click is reserved for multi-select (handled in click handler).
        // Skip drag/select setup so the click can toggle selection cleanly.
        if (e.ctrlKey || e.metaKey) return;

        // Raycast to see if we hit a piece
        getMouseNDC(e);
        raycaster.setFromCamera(mouse, camera);
        var meshes = pieces.filter(function(m) { return m.visible; });
        var intersects = raycaster.intersectObjects(meshes, false);

        if (intersects.length > 0) {
            // Prefer already-selected piece or group member
            var hitMesh = intersects[0].object;
            for (var i = 0; i < intersects.length; i++) {
                var obj = intersects[i].object;
                if (obj === selectedPiece) { hitMesh = obj; break; }
                if (selectedGroup && obj.userData.groupId === selectedGroup.userData.gId) { hitMesh = obj; break; }
            }
            // Resolve to group if the hit mesh belongs to one
            if (hitMesh.userData.groupId) {
                dragPiece = findGroupById(hitMesh.userData.groupId) || hitMesh;
            } else {
                dragPiece = hitMesh;
            }
            dragMode = true;
            if (dragPiece instanceof THREE.Group) {
                selectGroup(dragPiece);
            } else {
                selectPiece(dragPiece);
            }

            // Build drag plane
            if (e.shiftKey) {
                // Vertical (Y) mode: plane faces camera
                var camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                camDir.y = 0;
                camDir.normalize();
                if (camDir.length() < 0.01) camDir.set(0, 0, 1);
                dragPlane.setFromNormalAndCoplanarPoint(camDir, dragPiece.position);
            } else {
                // XZ ground plane at piece's current Y
                dragPlane.setFromNormalAndCoplanarPoint(
                    new THREE.Vector3(0, 1, 0), dragPiece.position
                );
            }

            // Compute offset from piece origin to click point
            raycaster.ray.intersectPlane(dragPlane, dragIntersect);
            dragOffset.subVectors(dragPiece.position, dragIntersect);

            // Disable orbit controls during drag
            controls._enabled = false;
            renderer.domElement.style.cursor = 'grabbing';
        }
    });

    renderer.domElement.addEventListener('mousemove', function(e) {
        var dx = e.clientX - mouseDownPos.x;
        var dy = e.clientY - mouseDownPos.y;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;

        if (dragMode && dragPiece) {
            if (!dragStarted) {
                dragStarted = true;
                pushUndo();
            }

            getMouseNDC(e);
            raycaster.setFromCamera(mouse, camera);

            if (raycaster.ray.intersectPlane(dragPlane, dragIntersect)) {
                var newPos = dragIntersect.add(dragOffset);

                var isGroupDrag = dragPiece instanceof THREE.Group;
                if (e.shiftKey) {
                    // Only update Y
                    var yVal = newPos.y;
                    if (snapEnabled) {
                        var ys = faceSnapY(dragPiece, yVal);
                        if (ys.snapped && !wasSnappedY) flashSnap();
                        wasSnappedY = ys.snapped;
                        yVal = ys.y;
                    } else {
                        wasSnappedY = false;
                    }
                    dragPiece.position.y = yVal;
                } else {
                    // Update X and Z
                    var xVal = newPos.x;
                    var zVal = newPos.z;
                    if (snapEnabled) {
                        var fs = faceSnapXZ(dragPiece, xVal, zVal);
                        if (fs.snapped && !wasSnappedXZ) flashSnap();
                        wasSnappedXZ = fs.snapped;
                        xVal = fs.x;
                        zVal = fs.z;
                    } else {
                        wasSnappedXZ = false;
                    }
                    dragPiece.position.x = xVal;
                    dragPiece.position.z = zVal;
                }

                // Update side panel inputs
                if (dragPiece === selectedPiece) {
                    inputPX.value = Math.round(dragPiece.position.x);
                    inputPY.value = Math.round(dragPiece.position.y);
                    inputPZ.value = Math.round(dragPiece.position.z);
                } else if (isGroupDrag && dragPiece === selectedGroup) {
                    document.getElementById('grp-pos-x').value = Math.round(dragPiece.position.x);
                    document.getElementById('grp-pos-y').value = Math.round(dragPiece.position.y);
                    document.getElementById('grp-pos-z').value = Math.round(dragPiece.position.z);
                }

                if (labelsVisible && !isGroupDrag) updateLabelPosition(dragPiece);
            }
            return;
        }

        // Hover cursor: show grab cursor when hovering over a piece
        if (!dragMode && e.buttons === 0 && !cutMode && !rulerMode) {
            getMouseNDC(e);
            raycaster.setFromCamera(mouse, camera);
            var meshes = pieces.filter(function(m) { return m.visible; });
            var hits = raycaster.intersectObjects(meshes, false);
            renderer.domElement.style.cursor = hits.length > 0 ? 'grab' : '';
        }
        if (rulerMode) {
            renderer.domElement.style.cursor = 'crosshair';
            updateRulerHover(e);
        }
    });

    renderer.domElement.addEventListener('mouseup', function(e) {
        if (e.button !== 0) return;

        // End drag
        if (dragMode) {
            controls._enabled = true;
            dragMode = false;
            dragPiece = null;
            wasSnappedXZ = false;
            wasSnappedY = false;
            renderer.domElement.style.cursor = '';
            if (dragStarted) {
                // Was a real drag — don't fire click-to-select
                updateGrid();
                return;
            }
            // If not dragStarted, it was just a click on a piece — already selected in mousedown
            return;
        }

        if (isDragging) return;

        // Normal click-to-select
        getMouseNDC(e);
        raycaster.setFromCamera(mouse, camera);

        var meshes = pieces.filter(function(m) { return m.visible; });
        var intersects = raycaster.intersectObjects(meshes, false);

        if (rulerMode) {
            handleRulerClick(e);
            return;
        }

        // Click on a ruler label (outside ruler mode) → delete that ruler
        if (rulers.length > 0) {
            var rIdx = pickRulerSpriteAt(e);
            if (rIdx !== -1) {
                if (window.confirm(t('ruler.deleteConfirm'))) {
                    pushUndo();
                    removeRulerAt(rIdx);
                }
                return;
            }
        }

        if (cutMode) {
            if (intersects.length > 0) {
                var hit = intersects[0].object;
                if (!cutTarget) {
                    cutTarget = hit;
                    cutTarget.material.color.setHex(CUT_TARGET_COLOR);
                } else if (hit !== cutTarget) {
                    hit.material.color.setHex(CUT_TOOL_COLOR);
                    setTimeout(function() {
                        performCut(cutTarget, hit);
                    }, 100);
                }
            }
            return;
        }

        if (e.ctrlKey) {
            // Ctrl+click: toggle multi-select for grouping
            if (intersects.length > 0) toggleMultiSelect(intersects[0].object);
            return;
        }

        if (intersects.length > 0) {
            var clickedMesh = intersects[0].object;
            if (clickedMesh.userData.groupId) {
                var grp = findGroupById(clickedMesh.userData.groupId);
                if (grp) { selectGroup(grp); return; }
            }
            selectPiece(clickedMesh);
        } else {
            deselectGroup();
            multiSelected.forEach(function(m) { m.material.color.setHex(WOOD_COLOR); });
            multiSelected.clear();
            updateGroupButton();
            selectPiece(null);
        }
    });

    // ============================================================
    // Toolbar Button Handlers
    // ============================================================

    // Add-piece dropdowns
    function closeAllDropdowns() {
        var drops = document.querySelectorAll('.add-dropdown');
        for (var i = 0; i < drops.length; i++) drops[i].classList.remove('open');
    }

    function makeDefaultForType(type) {
        if (type === 'Board') return makeBoard();
        if (type === 'Dowel') return makeDowel();
        if (type === 'Wedge') return makeWedge();
        if (type === 'L-Bracket') return makeLBracket();
        if (type === 'Tapered Leg') return makeTaperedLeg();
    }

    function buildDropdownMenu(dropdown) {
        var type = dropdown.getAttribute('data-type');
        var menu = dropdown.querySelector('.add-menu');
        menu.innerHTML = '';

        // Default option
        var def = document.createElement('div');
        def.className = 'add-menu-item';
        def.innerHTML = '<span>' + t('template.default', { type: typeName(type) }) + '</span><span class="tpl-dims">' + templateDimsText(getDefaultDims(type)) + '</span>';
        def.addEventListener('click', function(e) {
            e.stopPropagation();
            addPiece(makeDefaultForType(type));
            closeAllDropdowns();
        });
        menu.appendChild(def);

        // Built-in templates for this type
        var matching = builtInTemplates.filter(function(t) { return t.type === type; });
        var custom = loadCustomTemplates().filter(function(t) { return t.type === type; });

        if (matching.length > 0) {
            var sep = document.createElement('div');
            sep.className = 'add-menu-sep';
            menu.appendChild(sep);
            var lbl = document.createElement('div');
            lbl.className = 'add-menu-label';
            lbl.textContent = t('template.builtIn');
            menu.appendChild(lbl);
            matching.forEach(function(tpl) {
                var item = document.createElement('div');
                item.className = 'add-menu-item';
                item.innerHTML = '<span>' + (tpl.nameKey ? t(tpl.nameKey) : tpl.name) + '</span><span class="tpl-dims">' + templateDimsText(tpl) + '</span>';
                item.addEventListener('click', function(e) {
                    e.stopPropagation();
                    addFromTemplate(tpl);
                    closeAllDropdowns();
                });
                menu.appendChild(item);
            });
        }

        if (custom.length > 0) {
            var sep2 = document.createElement('div');
            sep2.className = 'add-menu-sep';
            menu.appendChild(sep2);
            var lbl2 = document.createElement('div');
            lbl2.className = 'add-menu-label';
            lbl2.textContent = t('template.custom');
            menu.appendChild(lbl2);
            custom.forEach(function(tpl, idx) {
                var item = document.createElement('div');
                item.className = 'add-menu-item';
                var origIdx = loadCustomTemplates().indexOf(tpl);
                item.innerHTML = '<span>' + tpl.name + '</span><span class="tpl-dims">' + templateDimsText(tpl) + '</span>';
                var del = document.createElement('button');
                del.className = 'tpl-delete';
                del.textContent = '\u00D7';
                del.addEventListener('click', function(e) {
                    e.stopPropagation();
                    deleteCustomTemplate(idx);
                    buildDropdownMenus();
                });
                item.appendChild(del);
                item.addEventListener('click', function(e) {
                    e.stopPropagation();
                    addFromTemplate(tpl);
                    closeAllDropdowns();
                });
                menu.appendChild(item);
            });
        }
    }

    function getDefaultDims(type) {
        if (type === 'Board') return { type: 'Board', w: 100, h: 20, d: 50 };
        if (type === 'Dowel') return { type: 'Dowel', r: 10, h: 100 };
        if (type === 'Wedge') return { type: 'Wedge', w: 80, h: 60, d: 40 };
        if (type === 'L-Bracket') return { type: 'L-Bracket', w: 60, h: 80, d: 20 };
        if (type === 'Tapered Leg') return { type: 'Tapered Leg', rTop: 15, rBottom: 25, h: 200 };
        return {};
    }

    function buildDropdownMenus() {
        var drops = document.querySelectorAll('.add-dropdown');
        for (var i = 0; i < drops.length; i++) buildDropdownMenu(drops[i]);
    }

    // Toggle dropdown on button click
    var dropdowns = document.querySelectorAll('.add-dropdown');
    for (var di = 0; di < dropdowns.length; di++) {
        (function(dd) {
            dd.querySelector('button').addEventListener('click', function(e) {
                e.stopPropagation();
                var wasOpen = dd.classList.contains('open');
                closeAllDropdowns();
                if (!wasOpen) {
                    buildDropdownMenu(dd);
                    dd.classList.add('open');
                    // Position the fixed menu below the button
                    var btn = dd.querySelector('button');
                    var rect = btn.getBoundingClientRect();
                    var menu = dd.querySelector('.add-menu');
                    menu.style.top = rect.bottom + 2 + 'px';
                    menu.style.left = rect.left + 'px';
                }
            });
        })(dropdowns[di]);
    }

    // Close dropdowns when clicking elsewhere
    document.addEventListener('click', closeAllDropdowns);

    document.getElementById('btn-snap').addEventListener('click', function() {
        snapEnabled = !snapEnabled;
        this.textContent = snapEnabled ? t('toolbar.snap.on') : t('toolbar.snap.off');
        this.classList.toggle('active', snapEnabled);
    });

    document.getElementById('btn-labels').addEventListener('click', function() {
        labelsVisible = !labelsVisible;
        this.textContent = labelsVisible ? t('toolbar.labels.on') : t('toolbar.labels.off');
        this.classList.toggle('active', labelsVisible);
        if (labelsVisible) showAllLabels();
        else hideAllLabels();
    });

    document.getElementById('btn-xray').addEventListener('click', function() {
        xrayMode = !xrayMode;
        this.textContent = xrayMode ? t('toolbar.xray.on') : t('toolbar.xray.off');
        this.classList.toggle('active', xrayMode);
        pieces.forEach(applyXray);
    });

    document.getElementById('btn-cut').addEventListener('click', function() {
        if (cutMode) exitCutMode();
        else enterCutMode();
    });

    document.getElementById('btn-ruler').addEventListener('click', function() {
        if (rulerMode) exitRulerMode();
        else enterRulerMode();
    });

    document.getElementById('btn-clear-rulers').addEventListener('click', function() {
        if (rulers.length === 0) return;
        pushUndo();
        clearRulers();
    });

    document.getElementById('btn-split').addEventListener('click', openSplitModal);
    document.getElementById('split-cancel').addEventListener('click', closeSplitModal);
    document.getElementById('split-confirm').addEventListener('click', function() {
        splitSelected();
        closeSplitModal();
    });
    document.getElementById('split-mode').addEventListener('change', function() {
        updateSplitModeUI();
        updateSplitPreview();
    });
    document.getElementById('split-count').addEventListener('input', updateSplitPreview);
    document.getElementById('split-length').addEventListener('input', updateSplitPreview);
    document.getElementById('split-kerf').addEventListener('input', updateSplitPreview);
    document.getElementById('split-axis').addEventListener('change', updateSplitPreview);
    document.getElementById('split-keep-leftover').addEventListener('change', updateSplitPreview);
    (function() {
        var modal = document.getElementById('split-modal');
        var mouseDownOnOverlay = false;
        modal.addEventListener('mousedown', function(e) {
            mouseDownOnOverlay = (e.target === modal);
        });
        modal.addEventListener('mouseup', function(e) {
            if (mouseDownOnOverlay && e.target === modal) closeSplitModal();
            mouseDownOnOverlay = false;
        });
    })();

    document.getElementById('btn-overlaps').addEventListener('click', function() {
        if (overlapMode) {
            overlapMode = false;
            this.classList.remove('active');
            clearOverlaps();
        } else {
            overlapMode = true;
            this.classList.add('active');
            showOverlaps();
        }
    });

    document.getElementById('btn-undo').addEventListener('click', undo);
    document.getElementById('btn-redo').addEventListener('click', redo);
    document.getElementById('btn-duplicate').addEventListener('click', duplicateSelected);
    document.getElementById('btn-group').addEventListener('click', createGroup);
    document.getElementById('btn-delete').addEventListener('click', deleteSelected);
    document.getElementById('btn-ungroup').addEventListener('click', ungroup);

    // Group position inputs
    function onGroupPosChange() {
        if (!selectedGroup) return;
        pushUndo();
        selectedGroup.position.x = parseFloat(document.getElementById('grp-pos-x').value) || 0;
        selectedGroup.position.y = parseFloat(document.getElementById('grp-pos-y').value) || 0;
        selectedGroup.position.z = parseFloat(document.getElementById('grp-pos-z').value) || 0;
        updateGrid();
    }
    ['grp-pos-x', 'grp-pos-y', 'grp-pos-z'].forEach(function(id) {
        var inp = document.getElementById(id);
        inp.addEventListener('change', onGroupPosChange);
        bindEnter(inp, onGroupPosChange);
    });
    document.getElementById('btn-clear').addEventListener('click', clearAll);
    document.getElementById('btn-export').addEventListener('click', exportCSV);

    document.getElementById('btn-save').addEventListener('click', saveModel);
    document.getElementById('btn-load').addEventListener('click', function() {
        document.getElementById('load-file-input').click();
    });
    document.getElementById('load-file-input').addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            loadModel(e.target.files[0]);
            e.target.value = '';
        }
    });

    document.getElementById('btn-save-template').addEventListener('click', function() {
        saveAsTemplate();
        buildDropdownMenus();
    });

    document.getElementById('btn-export-templates').addEventListener('click', exportTemplates);
    document.getElementById('btn-import-templates').addEventListener('click', function() {
        document.getElementById('import-templates-input').click();
    });
    document.getElementById('import-templates-input').addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            importTemplates(e.target.files[0]);
            e.target.value = '';
        }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'z' && !e.shiftKey) {
            e.preventDefault();
            undo();
        } else if (e.ctrlKey && e.key === 'Z' && e.shiftKey) {
            e.preventDefault();
            redo();
        } else if (e.ctrlKey && e.key === 'd') {
            e.preventDefault();
            duplicateSelected();
        } else if (e.key === 'Delete' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
            deleteSelected();
        } else if (e.key === 'Escape') {
            if (rulerMode) {
                if (rulerFirstPoint) {
                    rulerFirstPoint = null;
                    updateRulerHint();
                    hideRulerPreview();
                } else {
                    exitRulerMode();
                }
            } else if (cutMode) {
                exitCutMode();
            }
        }
    });

    // ============================================================
    // Window Resize
    // ============================================================

    window.addEventListener('resize', function() {
        var w = viewport.clientWidth;
        var h = viewport.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });

    // ============================================================
    // Render Loop
    // ============================================================

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    function refreshDynamicUI() {
        var snapBtn = document.getElementById('btn-snap');
        if (snapBtn) snapBtn.textContent = snapEnabled ? t('toolbar.snap.on') : t('toolbar.snap.off');
        var labelsBtn = document.getElementById('btn-labels');
        if (labelsBtn) labelsBtn.textContent = labelsVisible ? t('toolbar.labels.on') : t('toolbar.labels.off');
        var xrayBtn = document.getElementById('btn-xray');
        if (xrayBtn) xrayBtn.textContent = xrayMode ? t('toolbar.xray.on') : t('toolbar.xray.off');
        var groupBtn = document.getElementById('btn-group');
        if (groupBtn) groupBtn.textContent = t('toolbar.group');
        updateRulerHint();
        updateGroupButton();
        updateObjectList();
        updateSizeSummary();
        updateCostSummary();
        buildDropdownMenus();
        var modal = document.getElementById('split-modal');
        if (modal && modal.classList.contains('open')) {
            var axisSel = document.getElementById('split-axis');
            var prevAxis = axisSel.value;
            var opts = splitAxisOptionsForSelected();
            axisSel.innerHTML = '';
            opts.forEach(function(o) {
                var opt = document.createElement('option');
                opt.value = o.key;
                opt.textContent = o.label;
                axisSel.appendChild(opt);
            });
            if (prevAxis) axisSel.value = prevAxis;
            updateSplitPreview();
        }
    }

    var langSel = document.getElementById('lang-select');
    langSel.value = currentLang;
    langSel.addEventListener('change', function() { setLanguage(this.value); });

    applyTranslations();
    animate();
    refreshDynamicUI();

});
</script>
