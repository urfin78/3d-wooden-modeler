<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Wooden Modeler</title>
<style>
    :root {
        --bg: #fafaf8;
        --surface: #ffffff;
        --surface-2: #f4f3f0;
        --surface-3: #ebeae6;
        --border: #e5e3df;
        --border-strong: #d3d0ca;
        --text: #1f1d1b;
        --text-muted: #6b6660;
        --text-faint: #9a958e;
        --accent: #b8763a;
        --accent-hover: #a06530;
        --accent-soft: #f3e9dc;
        --accent-faint: #faf3e9;
        --danger: #c44a3a;
        --info: #3a7adc;
        --info-soft: #e6efff;
        --shadow-sm: 0 1px 2px rgba(20,15,10,.06);
        --shadow-md: 0 4px 16px rgba(20,15,10,.08);
        --shadow-lg: 0 8px 32px rgba(20,15,10,.12);
        --radius: 8px;
        --radius-sm: 6px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
        overflow: hidden; background: var(--bg); color: var(--text);
        font-size: 13px; -webkit-font-smoothing: antialiased;
    }
    #toolbar {
        position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 100;
        background: var(--surface); border-bottom: 1px solid var(--border);
        display: flex; align-items: center; padding: 0 10px; gap: 4px;
        overflow-x: auto; box-shadow: var(--shadow-sm);
    }
    #toolbar button {
        background: transparent; color: var(--text); border: 1px solid transparent;
        border-radius: var(--radius-sm); padding: 6px 11px; cursor: pointer;
        white-space: nowrap; font-size: 12px; font-weight: 500;
        transition: background .12s, border-color .12s, color .12s;
    }
    #toolbar button:hover { background: var(--surface-2); }
    #toolbar button.active {
        background: var(--accent-soft); color: var(--accent);
        border-color: var(--accent-soft);
    }
    #toolbar .separator {
        width: 1px; height: 22px; background: var(--border); margin: 0 6px; flex-shrink: 0;
    }
    #snap-indicator {
        position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
        background: var(--accent); color: #fff; padding: 5px 14px;
        border-radius: 999px; font-size: 12px; font-weight: 600;
        display: none; z-index: 200; box-shadow: var(--shadow-md);
    }
    #side-panel {
        position: fixed; top: 48px; right: 0; bottom: 0; width: 300px; z-index: 90;
        background: var(--bg); border-left: 1px solid var(--border); padding: 14px;
        overflow-y: auto; font-size: 13px;
    }
    #side-panel h3 {
        color: var(--text); margin: 14px 0 8px; font-size: 12px;
        font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
    }
    #side-panel h3:first-child { margin-top: 0; }
    #side-panel label {
        display: block; margin: 6px 0 3px; color: var(--text-muted);
        font-size: 11px; font-weight: 500;
    }
    #side-panel input[type="number"], #side-panel input[type="text"] {
        width: 100%; background: var(--surface); color: var(--text);
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        padding: 6px 8px; font-size: 12px; transition: border-color .12s, box-shadow .12s;
    }
    #side-panel input[type="number"]:focus, #side-panel input[type="text"]:focus {
        outline: none; border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-faint);
    }
    .input-row { display: flex; gap: 6px; }
    .input-row > div { flex: 1; }
    #size-summary {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius-sm); padding: 8px 10px; margin-top: 6px;
        font-size: 12px; color: var(--text-muted); min-height: 22px;
    }
    #overlap-list {
        background: #fdf2f0; border: 1px solid #f1c9c2;
        border-radius: var(--radius-sm); padding: 8px 10px; margin-top: 8px;
        font-size: 11px; color: var(--danger);
        max-height: 120px; overflow-y: auto; display: none;
    }
    #no-selection {
        color: var(--text-faint); font-style: italic;
        padding: 28px 0; text-align: center; font-size: 12px;
    }
    #dim-fields, #pos-fields, #rot-fields, #rot-buttons, #label-field, #summary-section { display: none; }
    #viewport { position: fixed; top: 48px; left: 0; right: 300px; bottom: 0; }
    canvas { display: block; }
    #object-list { margin-bottom: 10px; }
    #object-list-items {
        max-height: 180px; overflow-y: auto;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius-sm);
    }
    .obj-list-item {
        padding: 6px 10px; cursor: pointer; font-size: 12px;
        border-bottom: 1px solid var(--border); display: flex;
        justify-content: space-between; align-items: center;
        transition: background .1s;
    }
    .obj-list-item:last-child { border-bottom: none; }
    .obj-list-item:hover { background: var(--surface-2); }
    .obj-list-item.selected { background: var(--accent-soft); color: var(--accent); }
    .obj-list-item .obj-type { color: var(--text-faint); font-size: 10px; }
    .obj-list-item.selected .obj-type { color: var(--accent); opacity: .75; }
    .obj-list-item.grouped { padding-left: 22px; border-left: 2px solid var(--accent); }
    .obj-list-item.grouped.selected { border-left-color: var(--accent-hover); }
    .obj-group-header {
        padding: 5px 10px; font-size: 11px; font-weight: 600;
        background: var(--accent-faint); color: var(--accent);
        border-bottom: 1px solid var(--border); border-top: 1px solid var(--border);
        display: flex; justify-content: space-between; align-items: center;
    }
    .obj-group-header .group-cost { font-size: 10px; color: var(--accent-hover); opacity: .85; }
    .cost-group-header {
        display: flex; justify-content: space-between; padding: 4px 0 2px;
        font-size: 11px; font-weight: 600; color: var(--accent);
        border-top: 1px solid var(--border); margin-top: 4px;
    }
    .cost-row.grouped { padding-left: 14px; color: var(--text-muted); }
    .rot-btn-row { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .rot-btn-row button {
        background: var(--surface); color: var(--text);
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        padding: 5px 6px; cursor: pointer; font-size: 11px; flex: 1; min-width: 0;
        transition: background .1s, border-color .1s;
    }
    .rot-btn-row button:hover { background: var(--surface-2); border-color: var(--border-strong); }
    .add-dropdown { position: relative; display: inline-block; }
    .add-dropdown > button {
        background: transparent; color: var(--text);
        border: 1px solid transparent; border-radius: var(--radius-sm);
        padding: 6px 11px; cursor: pointer; white-space: nowrap;
        font-size: 12px; font-weight: 500;
    }
    .add-dropdown > button:hover { background: var(--surface-2); }
    .add-dropdown > button::after { content: ' \25BE'; font-size: 9px; color: var(--text-muted); }
    .add-menu {
        display: none; position: fixed; min-width: 200px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius); z-index: 300; padding: 5px 0;
        box-shadow: var(--shadow-lg);
    }
    .add-dropdown.open .add-menu { display: block; }
    .add-menu-item {
        display: flex; justify-content: space-between; padding: 7px 12px;
        cursor: pointer; font-size: 12px; color: var(--text);
    }
    .add-menu-item:hover { background: var(--surface-2); }
    .add-menu-item .tpl-dims { color: var(--text-faint); font-size: 10px; }
    .add-menu-sep { height: 1px; background: var(--border); margin: 5px 10px; }
    .add-menu-label {
        padding: 6px 12px 3px; font-size: 10px; color: var(--text-faint);
        text-transform: uppercase; letter-spacing: .05em; font-weight: 600;
    }
    .tpl-delete {
        background: none; border: none; color: var(--text-faint);
        cursor: pointer; font-size: 14px; padding: 0 4px;
    }
    .tpl-delete:hover { color: var(--danger); }
    #btn-save-template {
        display: none; width: 100%; background: var(--surface); color: var(--text);
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        padding: 6px 10px; cursor: pointer; font-size: 12px; margin-top: 8px;
    }
    #btn-save-template:hover { background: var(--surface-2); }
    #template-io { display: flex; gap: 4px; margin-top: 6px; }
    #template-io button {
        flex: 1; background: var(--surface); color: var(--text);
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        padding: 5px 6px; cursor: pointer; font-size: 11px;
    }
    #template-io button:hover { background: var(--surface-2); }
    #cost-summary {
        margin-top: 14px; border-top: 1px solid var(--border); padding-top: 10px;
    }
    #cost-items {
        max-height: 140px; overflow-y: auto; font-size: 11px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius-sm); padding: 6px 8px; margin-bottom: 6px;
    }
    .cost-row { display: flex; justify-content: space-between; padding: 2px 0; }
    #cost-total {
        font-weight: 600; font-size: 13px; text-align: right; color: var(--accent);
    }
    .price-row { display: flex; gap: 6px; align-items: flex-end; }
    .price-row > div:first-child { flex: 1; }
    .price-row select {
        background: var(--surface); color: var(--text);
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        padding: 5px 4px; font-size: 12px;
    }
    #currency-select {
        background: var(--surface); color: var(--text);
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        padding: 2px 6px; font-size: 11px; float: right;
    }
    #lang-select {
        background: transparent; color: var(--text);
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        padding: 5px 8px; font-size: 12px; cursor: pointer;
    }
    #lang-select:hover { background: var(--surface-2); }
    .modal-overlay {
        position: fixed; inset: 0; background: rgba(20,15,10,.35);
        z-index: 1000; display: none; align-items: center; justify-content: center;
        backdrop-filter: blur(2px);
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius); padding: 18px 20px; width: 340px;
        box-shadow: var(--shadow-lg);
    }
    .modal-box h3 {
        color: var(--text); margin: 0 0 12px; font-size: 15px; font-weight: 600;
    }
    .modal-box label {
        display: block; margin: 10px 0 3px; color: var(--text-muted); font-size: 11px;
    }
    .modal-box input[type="number"], .modal-box select {
        width: 100%; background: var(--surface); color: var(--text);
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        padding: 6px 8px; font-size: 12px;
    }
    .modal-box input[type="number"]:focus, .modal-box select:focus {
        outline: none; border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-faint);
    }
    #split-preview {
        background: var(--surface-2); border: 1px solid var(--border);
        border-radius: var(--radius-sm); padding: 8px 10px; margin-top: 12px;
        font-size: 12px; color: var(--text-muted); min-height: 20px;
    }
    #split-preview.err { color: var(--danger); }
    .modal-buttons { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    .modal-buttons button {
        background: var(--surface); color: var(--text);
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        padding: 7px 16px; cursor: pointer; font-size: 12px; font-weight: 500;
    }
    .modal-buttons button:hover { background: var(--surface-2); }
    .modal-buttons button.primary {
        background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .modal-buttons button.primary:hover {
        background: var(--accent-hover); border-color: var(--accent-hover);
    }
    .modal-buttons button.primary:disabled {
        background: var(--surface-3); color: var(--text-faint);
        border-color: var(--border); cursor: not-allowed;
    }
    #group-panel { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    #group-panel h3 { margin: 0 0 6px; color: var(--text); font-size: 12px; }
    #group-member-info { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
    #btn-ungroup {
        width: 100%; background: var(--surface); color: var(--text);
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        padding: 6px 10px; cursor: pointer; font-size: 12px; margin-top: 6px;
    }
    #btn-ungroup:hover { background: var(--surface-2); }
    .obj-list-item.multi-selected { background: var(--info-soft); color: var(--info); }
    .obj-list-item.group-member { padding-left: 22px; border-left: 2px solid var(--info); }
    .obj-group-scene-header {
        padding: 5px 10px; font-size: 11px; font-weight: 600;
        background: var(--info-soft); color: var(--info);
        border-bottom: 1px solid var(--border); border-top: 1px solid var(--border);
    }
    /* Scrollbars — subtle */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; border: 2px solid var(--bg); }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }
</style>
</head>
<body>

<div id="toolbar">
    <div class="add-dropdown" data-type="Board"><button data-i18n="toolbar.add.board">+ Board</button><div class="add-menu"></div></div>
    <div class="add-dropdown" data-type="Dowel"><button data-i18n="toolbar.add.dowel">+ Dowel</button><div class="add-menu"></div></div>
    <div class="add-dropdown" data-type="Wedge"><button data-i18n="toolbar.add.wedge">+ Wedge</button><div class="add-menu"></div></div>
    <div class="add-dropdown" data-type="L-Bracket"><button data-i18n="toolbar.add.lbracket">+ L-Bracket</button><div class="add-menu"></div></div>
    <div class="add-dropdown" data-type="Tapered Leg"><button data-i18n="toolbar.add.taperedLeg">+ Tapered Leg</button><div class="add-menu"></div></div>
    <div class="separator"></div>
    <button id="btn-snap">Snap OFF</button>
    <button id="btn-labels">Labels OFF</button>
    <button id="btn-xray">X-Ray OFF</button>
    <div class="separator"></div>
    <button id="btn-cut" data-i18n="toolbar.cut">Cut Joint</button>
    <button id="btn-split" data-i18n="toolbar.split">Split</button>
    <button id="btn-ruler" data-i18n="toolbar.ruler">Ruler</button>
    <button id="btn-clear-rulers" data-i18n="toolbar.clearRulers">Clear Rulers</button>
    <button id="btn-overlaps" data-i18n="toolbar.overlaps">Show Overlaps</button>
    <div class="separator"></div>
    <button id="btn-undo" data-i18n="toolbar.undo">Undo</button>
    <button id="btn-redo" data-i18n="toolbar.redo">Redo</button>
    <div class="separator"></div>
    <button id="btn-duplicate" data-i18n="toolbar.duplicate">Duplicate</button>
    <button id="btn-group" data-i18n="toolbar.group" disabled>Group</button>
    <button id="btn-delete" data-i18n="toolbar.delete">Delete</button>
    <button id="btn-clear" data-i18n="toolbar.clearAll">Clear All</button>
    <div class="separator"></div>
    <button id="btn-export" data-i18n="toolbar.exportCsv">Export CSV</button>
    <div class="separator"></div>
    <button id="btn-save" data-i18n="toolbar.save">Save</button>
    <button id="btn-load" data-i18n="toolbar.load">Load</button>
    <input type="file" id="load-file-input" accept=".woodmodel.json,.json" style="display:none">
    <div class="separator"></div>
    <select id="lang-select" data-i18n-title="lang.label">
        <option value="en">EN</option>
        <option value="de">DE</option>
    </select>
</div>

<div id="snap-indicator" data-i18n="snap.indicator">Snapped!</div>
<div id="ruler-hint" style="position:fixed; top:56px; left:50%; transform:translateX(-50%); background:#3a7adc; color:#fff; padding:4px 12px; border-radius:4px; font-size:12px; font-weight:bold; display:none; z-index:200;"></div>

<div id="side-panel">
    <div id="object-list">
        <h3 data-i18n="panel.objects">Objects</h3>
        <div id="object-list-items"></div>
    </div>

    <div id="no-selection" data-i18n="panel.noSelection">No piece selected</div>

    <div id="dim-fields">
        <h3 data-i18n="panel.dimensions">Dimensions (mm)</h3>
        <div id="dim-whd">
            <div class="input-row">
                <div><label data-i18n="panel.dim.w">W</label><input type="number" id="dim-w" step="1" min="1"></div>
                <div><label data-i18n="panel.dim.h">H</label><input type="number" id="dim-h" step="1" min="1"></div>
                <div><label data-i18n="panel.dim.d">D</label><input type="number" id="dim-d" step="1" min="1"></div>
            </div>
        </div>
        <div id="dim-rh" style="display:none">
            <div class="input-row">
                <div><label data-i18n="panel.dim.radius">Radius</label><input type="number" id="dim-r" step="1" min="1"></div>
                <div><label data-i18n="panel.dim.height">Height</label><input type="number" id="dim-rh-h" step="1" min="1"></div>
            </div>
        </div>
        <div id="dim-tapered" style="display:none">
            <div class="input-row">
                <div><label data-i18n="panel.dim.topR">Top R</label><input type="number" id="dim-rt" step="1" min="1"></div>
                <div><label data-i18n="panel.dim.botR">Bot R</label><input type="number" id="dim-rb" step="1" min="1"></div>
                <div><label data-i18n="panel.dim.height">Height</label><input type="number" id="dim-th" step="1" min="1"></div>
            </div>
        </div>
    </div>

    <div id="pos-fields">
        <h3 data-i18n="panel.position">Position (mm)</h3>
        <div class="input-row">
            <div><label data-i18n="panel.pos.x">X</label><input type="number" id="pos-x" step="1"></div>
            <div><label data-i18n="panel.pos.y">Y</label><input type="number" id="pos-y" step="1"></div>
            <div><label data-i18n="panel.pos.z">Z</label><input type="number" id="pos-z" step="1"></div>
        </div>
    </div>

    <div id="rot-fields">
        <h3 data-i18n="panel.rotation">Rotation (degrees)</h3>
        <div class="input-row">
            <div><label data-i18n="panel.rot.x">X</label><input type="number" id="rot-x" step="1"></div>
            <div><label data-i18n="panel.rot.y">Y</label><input type="number" id="rot-y" step="1"></div>
            <div><label data-i18n="panel.rot.z">Z</label><input type="number" id="rot-z" step="1"></div>
        </div>
    </div>

    <div id="rot-buttons">
        <h3 data-i18n="panel.quickRotate">Quick Rotate</h3>
        <div class="rot-btn-row">
            <button id="rot-x-l">X -90</button>
            <button id="rot-x-r">X +90</button>
            <button id="rot-x-180">X 180</button>
        </div>
        <div class="rot-btn-row">
            <button id="rot-y-l">Y -90</button>
            <button id="rot-y-r">Y +90</button>
            <button id="rot-y-180">Y 180</button>
        </div>
        <div class="rot-btn-row">
            <button id="rot-z-l">Z -90</button>
            <button id="rot-z-r">Z +90</button>
            <button id="rot-z-180">Z 180</button>
        </div>
    </div>

    <div id="label-field">
        <h3 data-i18n="panel.label">Label</h3>
        <input type="text" id="label-input" data-i18n-placeholder="panel.labelPlaceholder" placeholder="Enter label...">
    </div>

    <div id="price-field" style="display:none">
        <h3 data-i18n="panel.price">Price</h3>
        <div class="price-row">
            <div><label data-i18n="panel.unitPrice">Unit Price</label><input type="number" id="price-input" step="0.01" min="0" value="0"></div>
            <div><label data-i18n="panel.priceMode">Mode</label><select id="price-mode"><option value="fixed" data-i18n="panel.priceMode.fixed">Fixed</option><option value="per_mm" data-i18n="panel.priceMode.perMm">Per mm</option></select></div>
        </div>
    </div>

    <div id="summary-section">
        <h3 data-i18n="panel.sizeSummary">Size Summary</h3>
        <div id="size-summary"></div>
    </div>

    <div id="group-panel" style="display:none">
        <h3 data-i18n="panel.group.title">Group</h3>
        <div id="group-member-info"></div>
        <div class="input-row">
            <div><label data-i18n="panel.pos.x">X</label><input type="number" id="grp-pos-x" step="1"></div>
            <div><label data-i18n="panel.pos.y">Y</label><input type="number" id="grp-pos-y" step="1"></div>
            <div><label data-i18n="panel.pos.z">Z</label><input type="number" id="grp-pos-z" step="1"></div>
        </div>
        <button id="btn-ungroup" data-i18n="panel.group.ungroup">Ungroup</button>
    </div>

    <button id="btn-save-template" data-i18n="panel.saveAsTemplate">Save as Template</button>
    <div id="template-io">
        <button id="btn-export-templates" data-i18n="toolbar.exportTemplates">Export Templates</button>
        <button id="btn-import-templates" data-i18n="toolbar.importTemplates">Import Templates</button>
        <input type="file" id="import-templates-input" accept=".woodtemplates.json,.json" style="display:none">
    </div>

    <div id="overlap-list"></div>

    <div id="cost-summary">
        <h3><span data-i18n="panel.costSummary">Cost Summary</span> <select id="currency-select"><option value="$">$</option><option value="€">€</option><option value="£">£</option></select></h3>
        <div id="cost-items"></div>
        <div id="cost-total">Total: 0</div>
    </div>

</div>

<div id="viewport"></div>

<div id="split-modal" class="modal-overlay">
    <div class="modal-box">
        <h3 data-i18n="split.title">Split Piece</h3>
        <label data-i18n="split.mode">Mode</label>
        <select id="split-mode">
            <option value="count" data-i18n="split.mode.count">By number of parts</option>
            <option value="length" data-i18n="split.mode.length">By part length</option>

    function detectDefaultLang() {
        var saved = localStorage.getItem(LANG_KEY);
        if (saved && translations[saved]) return saved;
        var nav = (navigator.language || 'en').toLowerCase();
        for (var i = 0; i < SUPPORTED_LANGS.length; i++) {
            if (nav.indexOf(SUPPORTED_LANGS[i]) === 0) return SUPPORTED_LANGS[i];
        }
        return 'en';
    }

    var currentLang = detectDefaultLang();

    function t(key, params) {
        var dict = translations[currentLang] || translations.en;
        var str = dict[key];
        if (str === undefined) str = translations.en[key];
        if (str === undefined) return key;
        if (params) {
            str = str.replace(/\{(\w+)\}/g, function(_, name) {
                return params[name] !== undefined ? params[name] : '{' + name + '}';
            });
        }
        return str;
    }

    function typeName(type) { return t('type.' + type); }

    function applyTranslations() {
        document.documentElement.lang = currentLang;
        var nodes = document.querySelectorAll('[data-i18n]');
        nodes.forEach(function(el) { el.textContent = t(el.getAttribute('data-i18n')); });
        var placeholders = document.querySelectorAll('[data-i18n-placeholder]');
        placeholders.forEach(function(el) { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
        var titles = document.querySelectorAll('[data-i18n-title]');
        titles.forEach(function(el) { el.title = t(el.getAttribute('data-i18n-title')); });
    }

    function setLanguage(lang) {
        if (!translations[lang]) return;
        currentLang = lang;
        localStorage.setItem(LANG_KEY, lang);
        applyTranslations();
        if (typeof refreshDynamicUI === 'function') refreshDynamicUI();
    }

    // ============================================================
    // CSG BSP-Tree Implementation (Evan Wallace algorithm)
    // ============================================================

    var EPSILON = 1e-5;
    var COPLANAR = 0;
    var FRONT = 1;
    var BACK = 2;
    var SPANNING = 3;

    function CSGVertex(pos, normal) {
        this.pos = pos.clone();
        this.normal = normal.clone();
    }
    CSGVertex.prototype.clone = function() {
        return new CSGVertex(this.pos, this.normal);
    };
    CSGVertex.prototype.flip = function() {
        this.normal.negate();
    };
    CSGVertex.prototype.interpolate = function(other, t) {
        return new CSGVertex(
            this.pos.clone().lerp(other.pos, t),
            this.normal.clone().lerp(other.normal, t).normalize()
        );
    };

    function CSGPlane(normal, w) {
        this.normal = normal;
        this.w = w;
    }
    CSGPlane.fromPoints = function(a, b, c) {
        var n = new THREE.Vector3().crossVectors(
            new THREE.Vector3().subVectors(b, a),
            new THREE.Vector3().subVectors(c, a)
        ).normalize();
        return new CSGPlane(n, n.dot(a));
    };
    CSGPlane.prototype.clone = function() {
        return new CSGPlane(this.normal.clone(), this.w);
    };
    CSGPlane.prototype.flip = function() {
        this.normal.negate();
        this.w = -this.w;
    };
    CSGPlane.prototype.splitPolygon = function(polygon, coplanarFront, coplanarBack, front, back) {
        var polygonType = 0;
        var types = [];
        for (var i = 0; i < polygon.vertices.length; i++) {
            var t = this.normal.dot(polygon.vertices[i].pos) - this.w;
            var type = (t < -EPSILON) ? BACK : (t > EPSILON) ? FRONT : COPLANAR;
            polygonType |= type;
            types.push(type);
        }
        switch (polygonType) {
            case COPLANAR:
                (this.normal.dot(polygon.plane.normal) > 0 ? coplanarFront : coplanarBack).push(polygon);
                break;
            case FRONT:
                front.push(polygon);
                break;
            case BACK:
                back.push(polygon);
                break;
            case SPANNING:
                var f = [], b = [];
                for (var i = 0; i < polygon.vertices.length; i++) {
                    var j = (i + 1) % polygon.vertices.length;
                    var ti = types[i], tj = types[j];
                    var vi = polygon.vertices[i], vj = polygon.vertices[j];
                    if (ti !== BACK) f.push(vi);
                    if (ti !== FRONT) b.push(ti !== BACK ? vi.clone() : vi);
                    if ((ti | tj) === SPANNING) {
                        var t = (this.w - this.normal.dot(vi.pos)) / this.normal.dot(new THREE.Vector3().subVectors(vj.pos, vi.pos));
                        var v = vi.interpolate(vj, t);
                        f.push(v);
                        b.push(v.clone());
                    }
                }
                if (f.length >= 3) front.push(new CSGPolygon(f, polygon.shared));
                if (b.length >= 3) back.push(new CSGPolygon(b, polygon.shared));
                break;
        }
    };

    function CSGPolygon(vertices, shared) {
        this.vertices = vertices;
        this.shared = shared;
        this.plane = CSGPlane.fromPoints(vertices[0].pos, vertices[1].pos, vertices[2].pos);
    }
    CSGPolygon.prototype.clone = function() {
        var vs = this.vertices.map(function(v) { return v.clone(); });
        return new CSGPolygon(vs, this.shared);
    };
    CSGPolygon.prototype.flip = function() {
        this.vertices.reverse().forEach(function(v) { v.flip(); });
        this.plane.flip();
    };

    function CSGNode(polygons) {
        this.plane = null;
        this.front = null;
        this.back = null;
        this.polygons = [];
        if (polygons && polygons.length) this.build(polygons);
    }
    CSGNode.prototype.clone = function() {
        var node = new CSGNode();
        node.plane = this.plane && this.plane.clone();
        node.front = this.front && this.front.clone();
        node.back = this.back && this.back.clone();
        node.polygons = this.polygons.map(function(p) { return p.clone(); });
        return node;
    };
    CSGNode.prototype.invert = function() {
        for (var i = 0; i < this.polygons.length; i++) this.polygons[i].flip();
        if (this.plane) this.plane.flip();
        if (this.front) this.front.invert();
        if (this.back) this.back.invert();
        var temp = this.front;
        this.front = this.back;
        this.back = temp;
    };
    CSGNode.prototype.clipPolygons = function(polygons) {
        if (!this.plane) return polygons.slice();
        var front = [], back = [];
        for (var i = 0; i < polygons.length; i++) {
            this.plane.splitPolygon(polygons[i], front, back, front, back);
        }
        if (this.front) front = this.front.clipPolygons(front);
        if (this.back) back = this.back.clipPolygons(back);
        else back = [];
        return front.concat(back);
    };
    CSGNode.prototype.clipTo = function(bsp) {
        this.polygons = bsp.clipPolygons(this.polygons);
        if (this.front) this.front.clipTo(bsp);
        if (this.back) this.back.clipTo(bsp);
    };
    CSGNode.prototype.allPolygons = function() {
        var polygons = this.polygons.slice();
        if (this.front) polygons = polygons.concat(this.front.allPolygons());
        if (this.back) polygons = polygons.concat(this.back.allPolygons());
        return polygons;
    };
    CSGNode.prototype.build = function(polygons) {
        if (!polygons.length) return;
        if (!this.plane) this.plane = polygons[0].plane.clone();
        var front = [], back = [];
        for (var i = 0; i < polygons.length; i++) {
            this.plane.splitPolygon(polygons[i], this.polygons, this.polygons, front, back);
        }
        if (front.length) {
            if (!this.front) this.front = new CSGNode();
            this.front.build(front);
        }
        if (back.length) {
            if (!this.back) this.back = new CSGNode();
            this.back.build(back);
        }
    };

    function csgFromMesh(mesh) {
        mesh.updateMatrixWorld(true);
        var geo = mesh.geometry;
        var pos = geo.attributes.position;
        var norm = geo.attributes.normal;
        var idx = geo.index;
        var polygons = [];
        var triCount = idx ? idx.count / 3 : pos.count / 3;
        for (var i = 0; i < triCount; i++) {
            var vertices = [];
            for (var j = 0; j < 3; j++) {
                var k = idx ? idx.getX(i * 3 + j) : i * 3 + j;
                var p = new THREE.Vector3(pos.getX(k), pos.getY(k), pos.getZ(k));
                var n = new THREE.Vector3(norm.getX(k), norm.getY(k), norm.getZ(k));
                p.applyMatrix4(mesh.matrixWorld);
                n.applyMatrix3(new THREE.Matrix3().getNormalMatrix(mesh.matrixWorld)).normalize();
                vertices.push(new CSGVertex(p, n));
            }
            polygons.push(new CSGPolygon(vertices, null));
        }
        return polygons;
    }

    function csgSubtract(meshA, meshB) {
        var a = new CSGNode(csgFromMesh(meshA));
        var b = new CSGNode(csgFromMesh(meshB));
        a.invert();
        a.clipTo(b);
        b.clipTo(a);
        b.invert();
        b.clipTo(a);
        b.invert();
        a.build(b.allPolygons());
        a.invert();
        var polygons = a.allPolygons();
        // Convert back to geometry in meshA's local space
        var inverseMatrix = new THREE.Matrix4().copy(meshA.matrixWorld).invert();
        var inverseNormalMatrix = new THREE.Matrix3().getNormalMatrix(inverseMatrix);
        var positions = [];
        var normals = [];
        for (var i = 0; i < polygons.length; i++) {
            var vs = polygons[i].vertices;
            // Fan triangulate
            for (var j = 2; j < vs.length; j++) {
                var tri = [vs[0], vs[j - 1], vs[j]];
                for (var k = 0; k < 3; k++) {
                    var p = tri[k].pos.clone().applyMatrix4(inverseMatrix);
                    var n = tri[k].normal.clone().applyMatrix3(inverseNormalMatrix).normalize();
                    positions.push(p.x, p.y, p.z);
                    normals.push(n.x, n.y, n.z);
                }
            }
        }
        var newGeo = new THREE.BufferGeometry();
        newGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        newGeo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
        return newGeo;
    }

    // Inline OrbitControls (minimal)
    var OrbitControls = (function() {
        function OC(camera, domElement) {
            this.camera = camera;
            this.domElement = domElement;
            this.target = new THREE.Vector3();
            this.enableDamping = false;
            this.dampingFactor = 0.05;
            this.rotateSpeed = 1.0;
            this.zoomSpeed = 1.0;
            this.panSpeed = 1.0;
            this._spherical = new THREE.Spherical();
            this._sphericalDelta = new THREE.Spherical();
            this._scale = 1;
            this._panOffset = new THREE.Vector3();
            this._rotateStart = new THREE.Vector2();
            this._rotateEnd = new THREE.Vector2();
            this._panStart = new THREE.Vector2();
            this._panEnd = new THREE.Vector2();
            this._state = -1; // -1=none, 0=rotate, 1=zoom, 2=pan
            this._enabled = true;
            var self = this;
            this._onMouseDown = function(e) { self._mouseDown(e); };
            this._onMouseMove = function(e) { self._mouseMove(e); };
            this._onMouseUp = function(e) { self._mouseUp(e); };
            this._onWheel = function(e) { self._wheel(e); };
            this._onContextMenu = function(e) { e.preventDefault(); };
            domElement.addEventListener('mousedown', this._onMouseDown, false);
            domElement.addEventListener('wheel', this._onWheel, false);
            domElement.addEventListener('contextmenu', this._onContextMenu, false);
            this.update();
        }
        OC.prototype._mouseDown = function(e) {
            if (!this._enabled) return;
            if (e.button === 0) this._state = 0; // left=rotate
            else if (e.button === 1) this._state = 1; // middle=zoom
            else if (e.button === 2) this._state = 2; // right=pan
            if (this._state === 0) {
                this._rotateStart.set(e.clientX, e.clientY);
            } else if (this._state === 2) {
                this._panStart.set(e.clientX, e.clientY);
            }
            document.addEventListener('mousemove', this._onMouseMove, false);
            document.addEventListener('mouseup', this._onMouseUp, false);
        };
        OC.prototype._mouseMove = function(e) {
            if (!this._enabled) return;
            if (this._state === 0) {
                this._rotateEnd.set(e.clientX, e.clientY);
                var delta = new THREE.Vector2().subVectors(this._rotateEnd, this._rotateStart);
                this._sphericalDelta.theta -= 2 * Math.PI * delta.x / this.domElement.clientHeight * this.rotateSpeed;
                this._sphericalDelta.phi -= 2 * Math.PI * delta.y / this.domElement.clientHeight * this.rotateSpeed;
                this._rotateStart.copy(this._rotateEnd);
            } else if (this._state === 2) {
                this._panEnd.set(e.clientX, e.clientY);
                var delta = new THREE.Vector2().subVectors(this._panEnd, this._panStart);
                this._pan(delta.x, delta.y);
                this._panStart.copy(this._panEnd);
            }
            this.update();
        };
        OC.prototype._mouseUp = function(e) {
            this._state = -1;
            document.removeEventListener('mousemove', this._onMouseMove, false);
            document.removeEventListener('mouseup', this._onMouseUp, false);
        };
        OC.prototype._wheel = function(e) {
            if (!this._enabled) return;
            e.preventDefault();
            if (e.deltaY < 0) this._scale *= 0.95;
            else this._scale *= 1.05;
            this.update();
        };
        OC.prototype._pan = function(dx, dy) {
            var offset = new THREE.Vector3();
            var pos = this.camera.position;
            offset.copy(pos).sub(this.target);
            var dist = offset.length();
            dist *= Math.tan((this.camera.fov / 2) * Math.PI / 180.0);
            var right = new THREE.Vector3();
            right.setFromMatrixColumn(this.camera.matrix, 0);
            right.multiplyScalar(-2 * dx * dist / this.domElement.clientHeight * this.panSpeed);
            var up = new THREE.Vector3();
            up.setFromMatrixColumn(this.camera.matrix, 1);
            up.multiplyScalar(2 * dy * dist / this.domElement.clientHeight * this.panSpeed);
            this._panOffset.add(right).add(up);
        };
        OC.prototype.update = function() {
            var offset = new THREE.Vector3();
            offset.copy(this.camera.position).sub(this.target);
            this._spherical.setFromVector3(offset);
            this._spherical.theta += this._sphericalDelta.theta;
            this._spherical.phi += this._sphericalDelta.phi;
            this._spherical.phi = Math.max(0.01, Math.min(Math.PI - 0.01, this._spherical.phi));
            this._spherical.radius *= this._scale;
            this._spherical.radius = Math.max(10, Math.min(5000, this._spherical.radius));
            this.target.add(this._panOffset);
            offset.setFromSpherical(this._spherical);
            this.camera.position.copy(this.target).add(offset);
            this.camera.lookAt(this.target);
            this._sphericalDelta.set(0, 0, 0);
            this._scale = 1;
            this._panOffset.set(0, 0, 0);
        };
        return OC;
    })();

    function updateGrid() {
        // Minimum grid size
        var minSize = 1000;
        var needed = minSize;
        if (pieces.length > 0) {
            var box = new THREE.Box3();
            pieces.forEach(function(m) { box.expandByObject(m); });
            // Use the largest XZ extent, with padding
            var extX = Math.max(Math.abs(box.min.x), Math.abs(box.max.x));
            var extZ = Math.max(Math.abs(box.min.z), Math.abs(box.max.z));
            needed = Math.max(minSize, Math.ceil((Math.max(extX, extZ) * 2 + 200) / 100) * 100);
        }
        if (needed !== gridSize) {
            gridSize = needed;
            scene.remove(grid);
            grid.geometry.dispose();
            grid = new THREE.GridHelper(gridSize, gridSize / 10, 0xc8c4bd, 0xddd9d2);
            scene.add(grid);
            // Resize floor to match
            floor.geometry.dispose();
            floor.geometry = new THREE.PlaneGeometry(gridSize * 2, gridSize * 2);
        }
    }

    function makeWedge(w, h, d) {
        w = w || 80; h = h || 60; d = d || 40;
        var shape = new THREE.Shape();
        shape.moveTo(0, 0);
        shape.lineTo(w, 0);
        shape.lineTo(0, h);
        shape.closePath();
        var extrudeSettings = { depth: d, bevelEnabled: false };
        var geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        // Center the geometry
        geo.computeBoundingBox();
        var bb = geo.boundingBox;
        geo.translate(
            -(bb.max.x + bb.min.x) / 2,
            -(bb.max.y + bb.min.y) / 2,
            -(bb.max.z + bb.min.z) / 2
        );
        var mesh = new THREE.Mesh(geo, createWoodMaterial());
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.position.y = h / 2;
        mesh.userData = {
            type: 'Wedge', id: ++pieceCounter,
            w: w, h: h, d: d, label: typeName('Wedge') + ' ' + pieceCounter, notches: 0, csgModified: false
        };
        return mesh;
    }

    function makeLBracket(w, h, d) {
        w = w || 60; h = h || 80; d = d || 20;
        var t = Math.min(w, h) * 0.3;
        var shape = new THREE.Shape();
        shape.moveTo(0, 0);
        shape.lineTo(w, 0);
        shape.lineTo(w, t);
        shape.lineTo(t, t);
        shape.lineTo(t, h);
        shape.lineTo(0, h);
        shape.closePath();
        var extrudeSettings = { depth: d, bevelEnabled: false };
        var geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        geo.computeBoundingBox();
        var bb = geo.boundingBox;
        geo.translate(
            -(bb.max.x + bb.min.x) / 2,
            -(bb.max.y + bb.min.y) / 2,
            -(bb.max.z + bb.min.z) / 2
        );
        var mesh = new THREE.Mesh(geo, createWoodMaterial());
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.position.y = h / 2;
        mesh.userData = {

        mesh.material.depthWrite = !xrayMode || isActive;
    }

    function toggleMultiSelect(mesh) {
        // Can't multi-select pieces that are already in a group
        if (mesh.userData.groupId) return;
        // Clear single selection and group selection
        if (selectedPiece) { selectedPiece.material.color.setHex(WOOD_COLOR); selectedPiece = null; }
        if (selectedGroup) deselectGroup();

    function createGroup() {
        if (multiSelected.size < 2) return;
        pushUndo();
        var meshArray = Array.from(multiSelected);

        var center = new THREE.Vector3();
        meshArray.forEach(function(m) { center.add(m.position); });
        center.divideScalar(meshArray.length);

        var gId = 'grp_' + (++groupCounter);
        var group = new THREE.Group();
        group.userData.gId = gId;
        group.position.copy(center);
        scene.add(group);
        groups.push(group);

        meshArray.forEach(function(m) {
            scene.remove(m);
            m.position.sub(center);
            m.userData.groupId = gId;
            group.add(m);
            removeLabel(m);
        });

        multiSelected.clear();
        updateGroupButton();
        selectGroup(group);
        updateGrid();
    }

    function ungroup() {
        if (!selectedGroup) return;
        pushUndo();
        var group = selectedGroup;
        var children = group.children.slice();

        children.forEach(function(m) {
            var worldPos = new THREE.Vector3();
            m.getWorldPosition(worldPos);
            group.remove(m);
            m.position.copy(worldPos);
            m.userData.groupId = null;
            scene.add(m);
            if (labelsVisible) createLabel(m);
            applyXray(m);
        });

        scene.remove(group);
        var idx = groups.indexOf(group);
        if (idx !== -1) groups.splice(idx, 1);

        deselectGroup();
        selectPiece(null);
        updateGrid();
        updateObjectList();
    }

        ctx.textAlign = 'center';

        var sprite = new THREE.Sprite(mat);
        sprite.scale.set(80, 20, 1);

        if (xrayMode) pieces.forEach(applyXray);
        if (!mesh) {
            noSelection.style.display = 'block';
            dimFields.style.display = 'none';
            posFields.style.display = 'none';
            rotFields.style.display = 'none';
            document.getElementById('rot-buttons').style.display = 'none';
            labelField.style.display = 'none';
            priceField.style.display = 'none';
            summarySection.style.display = 'none';
            btnSaveTemplate.style.display = 'none';
            updateObjectList();
            updateCostSummary();
            return;
        }
        mesh.material.color.setHex(SELECT_COLOR);
        noSelection.style.display = 'none';
        dimFields.style.display = 'block';
        posFields.style.display = 'block';
        rotFields.style.display = 'block';
        document.getElementById('rot-buttons').style.display = 'block';
        labelField.style.display = 'block';
        priceField.style.display = 'block';
        summarySection.style.display = 'block';
        btnSaveTemplate.style.display = 'block';

        var ud = mesh.userData;
        if (ud.price === undefined) ud.price = 0;
        if (!ud.priceMode) ud.priceMode = 'fixed';
        var type = ud.type;

        // Show correct dimension fields
        dimWHD.style.display = 'none';
        dimRH.style.display = 'none';
        dimTapered.style.display = 'none';

        if (type === 'Board' || type === 'Wedge' || type === 'L-Bracket') {
            dimWHD.style.display = 'block';
            inputW.value = ud.w;
            inputH.value = ud.h;
            inputD.value = ud.d;
        } else if (type === 'Dowel') {
            dimRH.style.display = 'block';
            inputR.value = ud.r;
            inputRHH.value = ud.h;
        } else if (type === 'Tapered Leg') {
            dimTapered.style.display = 'block';
            inputRT.value = ud.rTop;
            inputRB.value = ud.rBottom;
            inputTH.value = ud.h;
        }

        inputPX.value = Math.round(mesh.position.x);
        inputPY.value = Math.round(mesh.position.y);
        inputPZ.value = Math.round(mesh.position.z);

        inputRX.value = Math.round(THREE.MathUtils.radToDeg(mesh.rotation.x));
        inputRY.value = Math.round(THREE.MathUtils.radToDeg(mesh.rotation.y));
        inputRZ.value = Math.round(THREE.MathUtils.radToDeg(mesh.rotation.z));

        inputLabel.value = ud.label || '';
        inputPrice.value = ud.price;
        inputPriceMode.value = ud.priceMode;

        updateSizeSummary();
        updateObjectList();
        updateCostSummary();
    }

    function updateSizeSummary() {

    function quickRotate(axis, degrees) {
        if (!selectedPiece) return;
        pushUndo();
        var oldBox = new THREE.Box3().setFromObject(selectedPiece);
        var wasGrounded = oldBox.min.y < 1;
        var rad = THREE.MathUtils.degToRad(degrees);
        if (axis === 'x') selectedPiece.rotation.x += rad;
        else if (axis === 'y') selectedPiece.rotation.y += rad;
        else if (axis === 'z') selectedPiece.rotation.z += rad;
        inputRX.value = normDeg(Math.round(THREE.MathUtils.radToDeg(selectedPiece.rotation.x)));
        inputRY.value = normDeg(Math.round(THREE.MathUtils.radToDeg(selectedPiece.rotation.y)));
        inputRZ.value = normDeg(Math.round(THREE.MathUtils.radToDeg(selectedPiece.rotation.z)));
        applyPostRotation(wasGrounded);
    }

    function rebuildGeometry(mesh) {
        if (mesh.userData.csgModified) return;
        var ud = mesh.userData;
        var oldGeo = mesh.geometry;
        var newGeo;
        if (ud.type === 'Board') {
            newGeo = new THREE.BoxGeometry(ud.w, ud.h, ud.d);
        } else if (ud.type === 'Dowel') {
            newGeo = new THREE.CylinderGeometry(ud.r, ud.r, ud.h, 32);
        } else if (ud.type === 'Wedge') {
            var shape = new THREE.Shape();
            shape.moveTo(0, 0);
            shape.lineTo(ud.w, 0);
            shape.lineTo(0, ud.h);
            shape.closePath();
            newGeo = new THREE.ExtrudeGeometry(shape, { depth: ud.d, bevelEnabled: false });
            newGeo.computeBoundingBox();
            var bb = newGeo.boundingBox;
            newGeo.translate(-(bb.max.x + bb.min.x) / 2, -(bb.max.y + bb.min.y) / 2, -(bb.max.z + bb.min.z) / 2);
        } else if (ud.type === 'L-Bracket') {
            var t = Math.min(ud.w, ud.h) * 0.3;
            var shape = new THREE.Shape();
            shape.moveTo(0, 0);
            shape.lineTo(ud.w, 0);
            shape.lineTo(ud.w, t);
            shape.lineTo(t, t);
            shape.lineTo(t, ud.h);
            shape.lineTo(0, ud.h);
            shape.closePath();
            newGeo = new THREE.ExtrudeGeometry(shape, { depth: ud.d, bevelEnabled: false });
            newGeo.computeBoundingBox();
            var bb = newGeo.boundingBox;
            newGeo.translate(-(bb.max.x + bb.min.x) / 2, -(bb.max.y + bb.min.y) / 2, -(bb.max.z + bb.min.z) / 2);
        } else if (ud.type === 'Tapered Leg') {
            newGeo = new THREE.CylinderGeometry(ud.rTop, ud.rBottom, ud.h, 32);
        }
        if (newGeo) {
            mesh.geometry = newGeo;
            oldGeo.dispose();
            if (labelsVisible) updateLabelPosition(mesh);
        }
    }

    function onDimChange() {
        if (!selectedPiece) return;
        pushUndo();
        var ud = selectedPiece.userData;
        if (ud.type === 'Board' || ud.type === 'Wedge' || ud.type === 'L-Bracket') {
            ud.w = Math.max(1, parseFloat(inputW.value) || 1);
            ud.h = Math.max(1, parseFloat(inputH.value) || 1);
            ud.d = Math.max(1, parseFloat(inputD.value) || 1);
        } else if (ud.type === 'Dowel') {
            ud.r = Math.max(1, parseFloat(inputR.value) || 1);
            ud.h = Math.max(1, parseFloat(inputRHH.value) || 1);
        } else if (ud.type === 'Tapered Leg') {
            ud.rTop = Math.max(1, parseFloat(inputRT.value) || 1);
            ud.rBottom = Math.max(1, parseFloat(inputRB.value) || 1);
            ud.h = Math.max(1, parseFloat(inputTH.value) || 1);
        }
        rebuildGeometry(selectedPiece);
        updateSizeSummary();
        updateGrid();
    }

    function snapValue(val) {
        return Math.round(val / 10) * 10;
    }

    var FACE_SNAP_THRESHOLD = 12;

    // Returns snapped x/z positions by aligning faces of mesh to faces of other pieces.
    // Falls back to grid snap when no face is within threshold.
    // For Dowels: additionally snaps the center axis to piece edges and centerlines.
    function faceSnapXZ(mesh, xVal, zVal) {
        mesh.position.x = xVal;
        mesh.position.z = zVal;
        // Force-update descendants so Group bounding boxes reflect the new position
        mesh.updateMatrixWorld(true);
        var box = new THREE.Box3().setFromObject(mesh);
        var rOff = box.max.x - mesh.position.x;
        var lOff = box.min.x - mesh.position.x;
        var fOff = box.max.z - mesh.position.z;
        var bOff = box.min.z - mesh.position.z;
        var isDowel = mesh.userData.type === 'Dowel';

        var bestX = null, bestZ = null;
        var bestDX = FACE_SNAP_THRESHOLD, bestDZ = FACE_SNAP_THRESHOLD;

        var isGroup = mesh instanceof THREE.Group;
        pieces.forEach(function(other) {
            if (other === mesh) return;
            // When dragging a group, don't snap to its own children
            if (isGroup && other.parent === mesh) return;
            var ob = new THREE.Box3().setFromObject(other);
            var ocx = (ob.min.x + ob.max.x) / 2;
            var ocz = (ob.min.z + ob.max.z) / 2;
            var d;
            // Face-to-face contact (opposite sides touch)
            d = Math.abs(box.max.x - ob.min.x);
            if (d < bestDX) { bestDX = d; bestX = ob.min.x - rOff; }
            d = Math.abs(box.min.x - ob.max.x);
            if (d < bestDX) { bestDX = d; bestX = ob.max.x - lOff; }
            // Coplanar alignment (same-side edges flush)
            d = Math.abs(box.max.x - ob.max.x);
            if (d < bestDX) { bestDX = d; bestX = ob.max.x - rOff; }
            d = Math.abs(box.min.x - ob.min.x);
            if (d < bestDX) { bestDX = d; bestX = ob.min.x - lOff; }

            d = Math.abs(box.max.z - ob.min.z);
            if (d < bestDZ) { bestDZ = d; bestZ = ob.min.z - fOff; }
            d = Math.abs(box.min.z - ob.max.z);
            if (d < bestDZ) { bestDZ = d; bestZ = ob.max.z - bOff; }
            d = Math.abs(box.max.z - ob.max.z);
            if (d < bestDZ) { bestDZ = d; bestZ = ob.max.z - fOff; }
            d = Math.abs(box.min.z - ob.min.z);
            if (d < bestDZ) { bestDZ = d; bestZ = ob.min.z - bOff; }

            // Dowel center-axis snaps: align dowel axis to piece edges and centerline
            if (isDowel) {
                d = Math.abs(mesh.position.x - ob.min.x);
                if (d < bestDX) { bestDX = d; bestX = ob.min.x; }
                d = Math.abs(mesh.position.x - ob.max.x);
                if (d < bestDX) { bestDX = d; bestX = ob.max.x; }
                d = Math.abs(mesh.position.x - ocx);
                if (d < bestDX) { bestDX = d; bestX = ocx; }

                d = Math.abs(mesh.position.z - ob.min.z);
                if (d < bestDZ) { bestDZ = d; bestZ = ob.min.z; }
                d = Math.abs(mesh.position.z - ob.max.z);
                if (d < bestDZ) { bestDZ = d; bestZ = ob.max.z; }
                d = Math.abs(mesh.position.z - ocz);
                if (d < bestDZ) { bestDZ = d; bestZ = ocz; }
            }
        });

        // Only report "snapped" when the correction is visible (delta > epsilon),
        // so the indicator doesn't flash when already sitting on an alignment.
        var EPS = 0.5;
        var snappedX = bestX !== null && Math.abs(bestX - xVal) > EPS;
        var snappedZ = bestZ !== null && Math.abs(bestZ - zVal) > EPS;
        return {
            x: bestX !== null ? bestX : snapValue(xVal),
            z: bestZ !== null ? bestZ : snapValue(zVal),
            snapped: snappedX || snappedZ
        };
    }

    // Returns snapped y position by aligning top/bottom faces.
    // For Dowels: additionally snaps the center (position.y) to piece faces for half-insertion.
    function faceSnapY(mesh, yVal) {
        mesh.position.y = yVal;
        mesh.updateMatrixWorld(true);
        var box = new THREE.Box3().setFromObject(mesh);
        var tOff = box.max.y - mesh.position.y;
        var bOff = box.min.y - mesh.position.y;
        var isDowel = mesh.userData.type === 'Dowel';

        var bestY = null;
        var bestD = FACE_SNAP_THRESHOLD;

        var isGroup = mesh instanceof THREE.Group;
        pieces.forEach(function(other) {
            if (other === mesh) return;
            if (isGroup && other.parent === mesh) return;
            var ob = new THREE.Box3().setFromObject(other);
            var d;
            // Top/bottom contact
            d = Math.abs(box.max.y - ob.min.y);
            if (d < bestD) { bestD = d; bestY = ob.min.y - tOff; }
            d = Math.abs(box.min.y - ob.max.y);
            if (d < bestD) { bestD = d; bestY = ob.max.y - bOff; }
            // Coplanar Y alignment (same height edges flush)
            d = Math.abs(box.max.y - ob.max.y);
            if (d < bestD) { bestD = d; bestY = ob.max.y - tOff; }
            d = Math.abs(box.min.y - ob.min.y);
            if (d < bestD) { bestD = d; bestY = ob.min.y - bOff; }
            // Dowel center snaps to piece face: center at top = 50% insertion into that piece
            if (isDowel) {
                d = Math.abs(mesh.position.y - ob.max.y);
                if (d < bestD) { bestD = d; bestY = ob.max.y; }
                d = Math.abs(mesh.position.y - ob.min.y);
                if (d < bestD) { bestD = d; bestY = ob.min.y; }
            }
        });

        var EPS = 0.5;
        var snappedY = bestY !== null && Math.abs(bestY - yVal) > EPS;
        return bestY !== null ? { y: bestY, snapped: snappedY } : { y: snapValue(yVal), snapped: false };
    }

    function onPosChange() {
        if (!selectedPiece) return;
        pushUndo();
        var x = parseFloat(inputPX.value) || 0;
        var y = parseFloat(inputPY.value) || 0;
        var z = parseFloat(inputPZ.value) || 0;
        if (snapEnabled) {
            var sx = snapValue(x), sy = snapValue(y), sz = snapValue(z);
            var changed = (sx !== x || sy !== y || sz !== z);
            x = sx; y = sy; z = sz;
            inputPX.value = x;
            inputPY.value = y;
            inputPZ.value = z;
            if (changed) flashSnap();
        }
        selectedPiece.position.set(x, y, z);
        if (labelsVisible) updateLabelPosition(selectedPiece);
        updateGrid();
    }

    // Called after any rotation change to re-snap, ground-adjust, and refresh inputs.
    function applyPostRotation(wasGrounded) {
        if (snapEnabled) {
            var pos = selectedPiece.position;
            var snXZ = faceSnapXZ(selectedPiece, pos.x, pos.z);
            selectedPiece.position.x = snXZ.x;
            selectedPiece.position.z = snXZ.z;
        }
        if (wasGrounded) {
            selectedPiece.updateMatrixWorld(true);
            var newBox = new THREE.Box3().setFromObject(selectedPiece);
            selectedPiece.position.y -= newBox.min.y;
        }
        inputPX.value = Math.round(selectedPiece.position.x);
        inputPY.value = Math.round(selectedPiece.position.y);
        inputPZ.value = Math.round(selectedPiece.position.z);
        if (labelsVisible) updateLabelPosition(selectedPiece);
        updateGrid();
    }

    function normDeg(v) { return ((v % 360) + 360) % 360; }

    function onRotChange() {
        if (!selectedPiece) return;
        pushUndo();
        var oldBox = new THREE.Box3().setFromObject(selectedPiece);
        var wasGrounded = oldBox.min.y < 1;
        var rx = normDeg(parseFloat(inputRX.value) || 0);
        var ry = normDeg(parseFloat(inputRY.value) || 0);
        var rz = normDeg(parseFloat(inputRZ.value) || 0);
        inputRX.value = rx; inputRY.value = ry; inputRZ.value = rz;
        selectedPiece.rotation.set(
            THREE.MathUtils.degToRad(rx),
            THREE.MathUtils.degToRad(ry),
            THREE.MathUtils.degToRad(rz)
        );
        applyPostRotation(wasGrounded);
    }

    function onLabelChange() {
        if (!selectedPiece) return;
        selectedPiece.userData.label = inputLabel.value;
        if (labelsVisible) updateLabelText(selectedPiece);
    }

    // Fire handler immediately on Enter key, then blur to sync display
    function bindEnter(inp, handler) {
        inp.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                handler.call(inp);
                inp.blur();
            }
        });
    }

    [inputW, inputH, inputD, inputR, inputRHH, inputRT, inputRB, inputTH].forEach(function(inp) {
        inp.addEventListener('change', onDimChange);
        bindEnter(inp, onDimChange);
    });
    [inputPX, inputPY, inputPZ].forEach(function(inp) {
        inp.addEventListener('change', onPosChange);
        bindEnter(inp, onPosChange);
    });
    [inputRX, inputRY, inputRZ].forEach(function(inp) {
        inp.addEventListener('change', onRotChange);
        bindEnter(inp, onRotChange);
    });
    inputLabel.addEventListener('input', onLabelChange);

    function onPriceChange() {
        if (!selectedPiece) return;
        selectedPiece.userData.price = parseFloat(inputPrice.value) || 0;
        selectedPiece.userData.priceMode = inputPriceMode.value;
        updateCostSummary();
    }
    inputPrice.addEventListener('change', onPriceChange);
    bindEnter(inputPrice, onPriceChange);
    inputPriceMode.addEventListener('change', onPriceChange);

    // Currency
    var currencySelect = document.getElementById('currency-select');
    var storedCurrency = localStorage.getItem('woodmodeler_currency');
    if (storedCurrency) currencySelect.value = storedCurrency;
    currencySelect.addEventListener('change', function() {
        localStorage.setItem('woodmodeler_currency', this.value);
        updateCostSummary();
    });

    function computePieceCost(mesh) {
        var ud = mesh.userData;
        var price = ud.price || 0;
        if (!price) return 0;
        if (ud.priceMode === 'per_mm') return price * ud.h;
        return price;
    }

    function updateCostSummary() {
        var currency = currencySelect.value;
        var costItems = document.getElementById('cost-items');
        var costTotal = document.getElementById('cost-total');
        var total = 0;
        var html = '';
        var renderedGroups = new Set();

        pieces.forEach(function(m) {
            var ud = m.userData;
            if (ud.price === undefined) ud.price = 0;
            if (!ud.priceMode) ud.priceMode = 'fixed';

            if (ud.sourceId) {
                if (!renderedGroups.has(ud.sourceId)) {
                    renderedGroups.add(ud.sourceId);
                    var groupPieces = pieces.filter(function(p) { return p.userData.sourceId === ud.sourceId; });
                    var groupCost = ud.sourcePrice || 0;
                    // Per-mm pieces in a group still contribute their individual costs
                    if (ud.sourcePriceMode === 'per_mm') {
                        groupCost = groupPieces.reduce(function(sum, p) { return sum + computePieceCost(p); }, 0);
                    }
                    total += groupCost;
                    html += '<div class="cost-group-header"><span>' + (ud.sourceLabel || typeName(ud.type)) + ' (' + groupPieces.length + ' ' + t('group.parts') + ')</span><span>' + currency + groupCost.toFixed(2) + '</span></div>';
                    groupPieces.forEach(function(gm) {
                        html += '<div class="cost-row grouped"><span>' + (gm.userData.label || gm.userData.type) + '</span><span>—</span></div>';
                    });
                }
            } else {
                var cost = computePieceCost(m);
                total += cost;
                html += '<div class="cost-row"><span>' + (ud.label || ud.type) + '</span><span>' + currency + cost.toFixed(2) + '</span></div>';
            }
        });
        costItems.innerHTML = html;
        costTotal.textContent = t('panel.costTotal') + ': ' + currency + total.toFixed(2);
    }

    // ============================================================
    // Snap
    // ============================================================

    var snapIndicator = document.getElementById('snap-indicator');
    var snapTimer = null;

    function flashSnap() {
        snapIndicator.style.display = 'block';
        clearTimeout(snapTimer);
        snapTimer = setTimeout(function() {
            snapIndicator.style.display = 'none';
        }, 600);
    }

    // ============================================================
    // Undo / Redo
    // ============================================================

    function serializeScene() {
        var _wp = new THREE.Vector3();
        var _wq = new THREE.Quaternion();
        var piecesState = [];
        pieces.forEach(function(mesh) {
            var ud = mesh.userData;
            // Always save world position so grouped pieces serialize correctly
            mesh.getWorldPosition(_wp);
            mesh.getWorldQuaternion(_wq);
            var _we = new THREE.Euler().setFromQuaternion(_wq, 'XYZ');
            var entry = {
                type: ud.type, id: ud.id, label: ud.label, notches: ud.notches,
                csgModified: ud.csgModified,
                price: ud.price || 0, priceMode: ud.priceMode || 'fixed',
                sourceId: ud.sourceId || null,
                sourcePrice: ud.sourcePrice || 0,
                sourcePriceMode: ud.sourcePriceMode || null,
                sourceLabel: ud.sourceLabel || null,
                groupId: ud.groupId || null,
                px: _wp.x, py: _wp.y, pz: _wp.z,
                rx: _we.x, ry: _we.y, rz: _we.z
            };
            if (ud.type === 'Board' || ud.type === 'Wedge' || ud.type === 'L-Bracket') {
                entry.w = ud.w; entry.h = ud.h; entry.d = ud.d;
            } else if (ud.type === 'Dowel') {
                entry.r = ud.r; entry.h = ud.h;
            } else if (ud.type === 'Tapered Leg') {
                entry.rTop = ud.rTop; entry.rBottom = ud.rBottom; entry.h = ud.h;
            }
            if (ud.csgModified) {
                var pos = mesh.geometry.attributes.position.array;
                var norm = mesh.geometry.attributes.normal.array;
                entry.geoPositions = Array.prototype.slice.call(pos);
                entry.geoNormals = Array.prototype.slice.call(norm);
            }
            piecesState.push(entry);
        });
        var groupsState = groups.map(function(g) {
            return { gId: g.userData.gId, px: g.position.x, py: g.position.y, pz: g.position.z,
                rx: g.rotation.x, ry: g.rotation.y, rz: g.rotation.z };
        });
        var rulersState = rulers.map(function(r) {
            return { p1: [r.p1.x, r.p1.y, r.p1.z], p2: [r.p2.x, r.p2.y, r.p2.z] };
        });
        return JSON.stringify({ pieces: piecesState, groups: groupsState, rulers: rulersState });
    }

    function restoreScene(json) {
        // Clear groups
        groups.forEach(function(g) { scene.remove(g); });
        groups = [];
        selectedGroup = null;
        multiSelected.clear();
        // Clear pieces
        pieces.forEach(function(m) {
            removeLabel(m);
            if (m.parent) m.parent.remove(m);
            m.geometry.dispose();
            m.material.dispose();
        });
        pieces = [];
        selectedPiece = null;

        var state = JSON.parse(json);
        // Support old format (plain array) and new format ({pieces, groups})
        var piecesData = Array.isArray(state) ? state : (state.pieces || []);
        var groupsData = Array.isArray(state) ? [] : (state.groups || []);
        var rulersData = Array.isArray(state) ? [] : (state.rulers || []);

        function restoreMesh(entry) {
            var mesh;
            if (entry.csgModified) {
                var geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.Float32BufferAttribute(entry.geoPositions, 3));
                geo.setAttribute('normal', new THREE.Float32BufferAttribute(entry.geoNormals, 3));
                mesh = new THREE.Mesh(geo, createWoodMaterial());
                mesh.castShadow = true;
                mesh.receiveShadow = true;
            } else {
                if (entry.type === 'Board') mesh = makeBoard(entry.w, entry.h, entry.d);
                else if (entry.type === 'Dowel') mesh = makeDowel(entry.r, entry.h);
                else if (entry.type === 'Wedge') mesh = makeWedge(entry.w, entry.h, entry.d);
                else if (entry.type === 'L-Bracket') mesh = makeLBracket(entry.w, entry.h, entry.d);
                else if (entry.type === 'Tapered Leg') mesh = makeTaperedLeg(entry.rTop, entry.rBottom, entry.h);
                pieceCounter--;
            }
            mesh.position.set(entry.px, entry.py, entry.pz);
            mesh.rotation.set(entry.rx, entry.ry, entry.rz);
            mesh.userData.type = entry.type;
            mesh.userData.id = entry.id;
            mesh.userData.label = entry.label;
            mesh.userData.notches = entry.notches;
            mesh.userData.csgModified = entry.csgModified;
            mesh.userData.price = entry.price || 0;
            mesh.userData.priceMode = entry.priceMode || 'fixed';
            mesh.userData.sourceId = entry.sourceId || null;
            mesh.userData.sourcePrice = entry.sourcePrice || 0;
            mesh.userData.sourcePriceMode = entry.sourcePriceMode || null;
            mesh.userData.sourceLabel = entry.sourceLabel || null;
            mesh.userData.groupId = entry.groupId || null;
            if (entry.type === 'Board' || entry.type === 'Wedge' || entry.type === 'L-Bracket') {
                mesh.userData.w = entry.w; mesh.userData.h = entry.h; mesh.userData.d = entry.d;
            } else if (entry.type === 'Dowel') {
                mesh.userData.r = entry.r; mesh.userData.h = entry.h;
            } else if (entry.type === 'Tapered Leg') {
                mesh.userData.rTop = entry.rTop; mesh.userData.rBottom = entry.rBottom; mesh.userData.h = entry.h;
            }
            return mesh;
        }

        // First pass: restore all pieces at world positions in scene
        piecesData.forEach(function(entry) {
            var mesh = restoreMesh(entry);
            scene.add(mesh);
            pieces.push(mesh);
            if (labelsVisible && !entry.groupId) createLabel(mesh);
            applyXray(mesh);
        });

        // Second pass: restore groups and attach children
        groupsData.forEach(function(gEntry) {
            var group = new THREE.Group();
            group.userData.gId = gEntry.gId;
            group.position.set(gEntry.px, gEntry.py, gEntry.pz);
            group.rotation.set(gEntry.rx, gEntry.ry, gEntry.rz);
            scene.add(group);
            groups.push(group);
            group.updateMatrixWorld(true);
            pieces.forEach(function(m) {
                if (m.userData.groupId === gEntry.gId) {
                    scene.remove(m);
                    var localPos = group.worldToLocal(m.position.clone());
                    m.position.copy(localPos);
                    group.add(m);
                }
            });
            var n = parseInt(gEntry.gId.replace('grp_', ''), 10);
            if (!isNaN(n) && n > groupCounter) groupCounter = n;
        });

        rebuildRulersFromData(rulersData);

        selectPiece(null);
        updateGrid();
    }

    function pushUndo() {
        undoStack.push(serializeScene());
        if (undoStack.length > MAX_UNDO) undoStack.shift();
        redoStack = [];
    }

    function undo() {
        if (undoStack.length === 0) return;
        redoStack.push(serializeScene());
        if (redoStack.length > MAX_UNDO) redoStack.shift();
        restoreScene(undoStack.pop());
    }

    function redo() {
        if (redoStack.length === 0) return;
        undoStack.push(serializeScene());
        if (undoStack.length > MAX_UNDO) undoStack.shift();
        restoreScene(redoStack.pop());
    }

    function saveModel() {
        var name = prompt(t('save.projectName'), t('save.defaultName'));
        if (name === null) return;
        var sceneData = JSON.parse(serializeScene());
        var data = {
            version: 3,
            name: name,
            created: new Date().toISOString(),
            pieces: sceneData.pieces,
            groups: sceneData.groups || [],
            rulers: sceneData.rulers || []
        };
        var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = (name || 'model').replace(/[^a-zA-Z0-9_-]/g, '_') + '.woodmodel.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    function loadModel(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
            try {
                var data = JSON.parse(e.target.result);
                // Auto-detect template files (array of objects with name+type but no position)
                if (Array.isArray(data) && data.length > 0 && data[0].name && data[0].type && !data[0].position) {
                    mergeImportedTemplates(data);
                    return;
                }
                var scenePayload;
                if (data.version >= 2 && data.pieces) {
                    // v2: groups; v3: + rulers
                    scenePayload = { pieces: data.pieces, groups: data.groups || [], rulers: data.rulers || [] };
                } else if (data.version === 1 && data.pieces) {
                    // Old format without groups
                    scenePayload = { pieces: data.pieces, groups: [] };
                } else if (Array.isArray(data)) {
                    // Raw array (legacy undo format)
                    scenePayload = data;
                } else {
                    alert(t('load.invalid'));
                    return;
                }
                if (pieces.length > 0 || groups.length > 0) {
                    if (!confirm(t('load.replace'))) return;
                }
                restoreScene(JSON.stringify(scenePayload));
                updateObjectList();
            } catch (err) {
                alert(t('load.failed', { msg: err.message }));
            }
        };
        reader.readAsText(file);
    }

    function mergeImportedTemplates(imported) {
        if (!Array.isArray(imported) || imported.length === 0) {
            alert(t('template.import.none'));
            return;
        }
        var existing = loadCustomTemplates();
        var existingNames = existing.map(function(tpl) { return tpl.name; });
        var added = 0;
        imported.forEach(function(tpl) {
            if (tpl.name && tpl.type && existingNames.indexOf(tpl.name) === -1) {
                existing.push(tpl);
                added++;
            }
        });
        saveCustomTemplates(existing);
        buildDropdownMenus();
        alert(t('template.import.added', { added: added, total: imported.length, skipped: imported.length - added }));
    }

    function performCut(target, tool) {
        pushUndo();
        try {
            var newGeo = csgSubtract(target, tool);
            target.geometry.dispose();
            target.geometry = newGeo;
            target.userData.notches++;
            target.userData.csgModified = true;
            target.material.color.setHex(WOOD_COLOR);
            tool.material.color.setHex(WOOD_COLOR);
            selectPiece(target);
        } catch (e) {
            console.error('CSG cut failed:', e);
            target.material.color.setHex(WOOD_COLOR);
            tool.material.color.setHex(WOOD_COLOR);
        }
        exitCutMode();
    }

    function createRulerLabelSprite(text) {
        var lines = text.split('\n');
        var canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 128;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(20,40,80,0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#3a7adc';
        ctx.lineWidth = 2;
        ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        var lh = canvas.height / (lines.length + 1);
        ctx.font = 'bold 22px Arial';
        ctx.fillText(lines[0], canvas.width / 2, lh);
        ctx.font = '16px Arial';
        for (var i = 1; i < lines.length; i++) {
            ctx.fillText(lines[i], canvas.width / 2, lh * (i + 1));
        }
        var tex = new THREE.CanvasTexture(canvas);
        var mat = new THREE.SpriteMaterial({ map: tex, depthTest: false });
        var sprite = new THREE.Sprite(mat);
        sprite.scale.set(100, 50, 1);
        return sprite;
    }

    function addRuler(p1, p2) {
        var dx = p2.x - p1.x, dy = p2.y - p1.y, dz = p2.z - p1.z;
        var dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
        var labelText = Math.round(dist) + ' mm\n' +
            'X ' + Math.round(Math.abs(dx)) +
            '  Y ' + Math.round(Math.abs(dy)) +
            '  Z ' + Math.round(Math.abs(dz));
        var geo = new THREE.BufferGeometry().setFromPoints([p1.clone(), p2.clone()]);
        var mat = new THREE.LineBasicMaterial({ color: 0x3a7adc, depthTest: false, transparent: true });
        var line = new THREE.Line(geo, mat);
        line.renderOrder = 999;
        scene.add(line);
        var sprite = createRulerLabelSprite(labelText);
        sprite.position.set((p1.x + p2.x) / 2, (p1.y + p2.y) / 2 + 8, (p1.z + p2.z) / 2);
        scene.add(sprite);
        rulers.push({ p1: p1.clone(), p2: p2.clone(), line: line, sprite: sprite });
    }

    function clearRulers() {
        rulers.forEach(function(r) {
            scene.remove(r.line);
            r.line.geometry.dispose();
            r.line.material.dispose();
            scene.remove(r.sprite);
            if (r.sprite.material.map) r.sprite.material.map.dispose();
            r.sprite.material.dispose();
        });
        rulers = [];
    }

    function removeRulerAt(index) {
        if (index < 0 || index >= rulers.length) return;
        var r = rulers[index];
        scene.remove(r.line);
        r.line.geometry.dispose();
        r.line.material.dispose();
        scene.remove(r.sprite);
        if (r.sprite.material.map) r.sprite.material.map.dispose();
        r.sprite.material.dispose();
        rulers.splice(index, 1);
    }

    function pickRulerSpriteAt(e) {
        getMouseNDC(e);
        raycaster.setFromCamera(mouse, camera);
        var sprites = rulers.map(function(r) { return r.sprite; });
        if (sprites.length === 0) return -1;
        var hits = raycaster.intersectObjects(sprites, false);
        if (hits.length === 0) return -1;
        var hitSprite = hits[0].object;
        for (var i = 0; i < rulers.length; i++) {
            if (rulers[i].sprite === hitSprite) return i;
        }
        return -1;
    }

    function rebuildRulersFromData(data) {
        clearRulers();
        if (!data) return;
        data.forEach(function(r) {
            addRuler(new THREE.Vector3(r.p1[0], r.p1[1], r.p1[2]),
                     new THREE.Vector3(r.p2[0], r.p2[1], r.p2[2]));
        });
    }
